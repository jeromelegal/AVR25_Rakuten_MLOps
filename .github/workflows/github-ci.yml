name: AVR25 Rakuten MLOps - CI
run-name: Test AVR25 Rakuten MLOps actions started by ${{ github.actor }}
on:
  push:
    branches:
      - '*'  # Cela signifie toutes les branches
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
env:
  FORCE_COLOR: "1"
jobs:

  clear-containers:
    runs-on: [self-hosted, phil-host]
    strategy:
      # max-parallel: 10
      matrix:
        service: [vault, consul, mongodb, api-mongodb, postgresql, api-postgresql, api-gateway, frontend, reverse-proxy, minio, api-minio]
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Get version from file
        id: get_version
        run: echo "VERSION=$(cat .version)" >> $GITHUB_OUTPUT
      - name: Stop and remove containers
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          # TAG="${VERSION}-${BRANCH_NAME}"
          TAG="${BRANCH_NAME}-${VERSION}"
          # Arrêter et retirer le conteneur
          # docker stop ${{ matrix.service }}-${BRANCH_NAME}-${VERSION} || true
          # docker rm ${{ matrix.service }}-${BRANCH_NAME}-${VERSION} || true
          docker stop ${{ matrix.service }}-${BRANCH_NAME}|| true
          docker rm ${{ matrix.service }}-${BRANCH_NAME} || true

  clear-network:
    runs-on: [self-hosted, phil-host]
    needs: [clear-containers]
    steps:
      - name: Remove Docker network
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          NETWORK_NAME="network-${BRANCH_NAME}"
          # docker network rm $NETWORK_NAME #|| true  # Ignore l'erreur si le réseau n'existe pas ou ne peut pas être supprimé
          if docker network inspect $NETWORK_NAME &> /dev/null; then
            docker network rm $NETWORK_NAME
          else
            echo "Réseau $NETWORK_NAME n'existe pas, pas besoin de le supprimer."
          fi

  build:
    runs-on: [self-hosted, phil-host]
    needs: [clear-containers]
    strategy:
      matrix:
        service: [vault, consul, mongodb, api-mongodb, postgresql, api-postgresql, api-gateway, frontend, reverse-proxy, minio, api-minio]
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Get version from file
        id: get_version
        run: echo "VERSION=$(cat .version)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:v0.16.0

      - name: Build services
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          # TAG="${VERSION}-${BRANCH_NAME}"
          TAG="${BRANCH_NAME}-${VERSION}"
          cd src/${{ matrix.service }}
          docker build -t ${{ matrix.service }}:$TAG .


  create-network:
    runs-on: [self-hosted, phil-host]
    needs: [clear-containers, clear-network]
    steps:
      - name: Create Docker network
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          NETWORK_NAME="network-${BRANCH_NAME}"
          docker network create $NETWORK_NAME || true # Ignore if network exists


  start-containers:
    runs-on: [self-hosted, phil-host]
    needs: [create-network, build] # Ce job dépend de la réussite du job "build"
    strategy:
      matrix:
        service: [vault, consul, mongodb, api-mongodb, postgresql, api-postgresql, api-gateway, frontend, reverse-proxy, minio, api-minio]
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Get version from file
        id: get_version
        run: echo "VERSION=$(cat .version)" >> $GITHUB_OUTPUT

      - name: Start containers
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          # TAG="${VERSION}-${BRANCH_NAME}"
          TAG="${BRANCH_NAME}-${VERSION}"
          # CONTAINER_NAME="${{ matrix.service }}-${BRANCH_NAME}-${VERSION}"
          CONTAINER_NAME="${{ matrix.service }}-${BRANCH_NAME}"
          CONFIG=$(/usr/local/bin/yq eval ".services.${{ matrix.service }}" services_config.yaml)
          RUN_AS_ROOT=$(/usr/local/bin/yq eval ".run_as_root" <<< "$CONFIG")
          NETWORK_NAME="network-${BRANCH_NAME}"
          if [ -z "$RUN_AS_ROOT" ] || [ "$RUN_AS_ROOT" = "null" ]; then
            RUN_AS_ROOT=false
          fi

          NETWORK_ALIASES=$(/usr/local/bin/yq eval ".network-alias // []" <<< "$CONFIG" || echo "")


          ENV_VARS=""
          # Traiter les env_vars existantes
          while read -r key value; do
              processed_value=$(echo "$value" | sed "s/\${BRANCH_NAME}/$BRANCH_NAME/g" | sed "s/\${VERSION}/$VERSION/g")
              echo "Clé: $key, Valeur: $processed_value"
              ENV_VARS+=" -e $key=$processed_value"
          done < <(yq eval ".services.${{ matrix.service }}.env_vars | to_entries | .[] | \"\(.key) \(.value)\"" services_config.yaml)


          CAP_ADD=$(/usr/local/bin/yq eval ".cap_add | join(\",\")" <<< "$CONFIG" || true)
          CAP_OPTIONS=""
          if [ "$CAP_ADD" != "null" ] && [ -n "$CAP_ADD" ]; then
              for cap in $(echo $CAP_ADD | tr ',' '\n'); do
                  CAP_OPTIONS+=" --cap-add=$cap"
              done
          fi

          # Extraire et traiter les ports exposés
          EXPOSE_PORTS=$(/usr/local/bin/yq eval ".expose_ports | join(\",\")" <<< "$CONFIG" || true)
          if [ "$EXPOSE_PORTS" != "null" ] && [ -n "$EXPOSE_PORTS" ]; then
              for port in $(echo $EXPOSE_PORTS | tr ',' '\n'); do
                  EXPOSE_OPTIONS+=" --expose=$port"
              done
          fi
          echo "DEBUG: EXPOSE_OPTIONS=$EXPOSE_OPTIONS"

          echo "Running with:"
          echo "docker run -d --user root $CAP_OPTIONS --name $CONTAINER_NAME $EXPOSE_OPTIONS $ENV_VARS ${{ matrix.service }}:$TAG"
          if [ "$RUN_AS_ROOT" = true ]; then
            docker run -d --user root $CAP_OPTIONS --name $CONTAINER_NAME  $EXPOSE_OPTIONS $ENV_VARS ${{ matrix.service }}:$TAG
          else
            docker run -d $CAP_OPTIONS --name $CONTAINER_NAME $ENV_VARS ${{ matrix.service }}:$TAG
          fi

          # Ajout des alias réseau après le démarrage du conteneur
          if [ -n "$NETWORK_ALIASES" ] && [ "$NETWORK_ALIASES" != "null" ]; then
              for alias in $(echo "$NETWORK_ALIASES" | /usr/local/bin/yq eval '.[]' - 2>/dev/null); do
                  echo "Ajout de l'alias $alias pour $CONTAINER_NAME sur $NETWORK_NAME"
                  docker network connect --alias "$alias" "$NETWORK_NAME" "$CONTAINER_NAME" || echo "Erreur lors de l'ajout de l'alias $alias"
              done
          fi


  health-check-containers:
    runs-on: [self-hosted, phil-host]
    needs: start-containers
    strategy:
      matrix:
        service: [vault, consul, mongodb, api-mongodb, postgresql, api-postgresql, api-gateway, frontend, reverse-proxy, minio, api-minio]
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Get version from file
        id: get_version
        run: echo "VERSION=$(cat .version)" >> $GITHUB_OUTPUT

      - name: Perform health checks
        run: |

          VERSION=${{ steps.get_version.outputs.VERSION }}
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          echo "Version: $VERSION"
          echo "Branch Name: $BRANCH_NAME"

          # HEALTH_CHECK=$(/usr/local/bin/yq eval ".services.${{ matrix.service }}.health_check.urls" services_config.yaml)
          # echo "Health Check Config: $HEALTH_CHECK"

          # echo "$HEALTH_CHECK" | /usr/local/bin/yq eval '.[]' | while read -r check; do
          #   echo "check= $check"
          #   URL=$(/usr/local/bin/yq eval '.url' <<< "$check")
          #   EXPECTED_CODE=$(/usr/local/bin/yq eval '.expected_code' <<< "$check")
          #   # Ajouter URL au tableau si elle n'est pas nulle
          #   if [ -n "$URL" ]; then
          #     URLS+=("$URL")
          #   fi

          #   # Ajouter expected_code au tableau s'il n'est pas nul
          #   if [ -n "$EXPECTED_CODE" ]; then
          #     EXPECTED_CODES+=("$EXPECTED_CODE")
          #   fi
          # done
          # echo "EXPECTED_CODES = $EXPECTED_CODES"
          # echo "URL = $URL"


          # Initialiser des tableaux pour stocker les URLs et les codes attendus
          URLS=()
          EXPECTED_CODES=()

          # Récupérer tous les couples URL et code attendu
          while IFS= read -r check; do
            echo "check -> $check"
            # Extraire les valeurs pour url et expected_code
            URL=$(/usr/local/bin/yq eval '.url' <<< "$check")
            EXPECTED_CODE=$(/usr/local/bin/yq eval '.expected_code' <<< "$check")

            # Ajouter URL au tableau si elle n'est pas nulle
            if [ -n "$URL" ] && [ "$URL" != "null" ]; then
              URLS+=("$URL")
            fi

            # Ajouter expected_code au tableau s'il n'est pas nul
            if [ -n "$EXPECTED_CODE" ] && [ "$EXPECTED_CODE" != "null" ]; then
              EXPECTED_CODES+=("$EXPECTED_CODE")
            fi
          done < <(/usr/local/bin/yq eval ".services.${{ matrix.service }}.health_check.urls | .[]" services_config.yaml)

          # Affichage des URLs et des codes pour vérification
          echo "URLs:"
          for url in "${URLS[@]}"; do
            echo "$url"
          done

          echo "Expected Codes:"
          for code in "${EXPECTED_CODES[@]}"; do
            echo "$code"
          done

          # Boucle infinie pour vérifier la santé des URLs
          while true; do
            all_healthy=true
            for i in "${!URLS[@]}"; do
              # S'assurer que l'index existe pour les deux tableaux avant de procéder
              if [ "$i" -lt "${#EXPECTED_CODES[@]}" ]; then
                URL="${URLS[i]}"
                EXPECTED_CODE="${EXPECTED_CODES[i]}"
                echo "Checking URL: $URL with expected code: $EXPECTED_CODE"

                # Exécuter curl depuis un conteneur sur le réseau spécifié
                HTTP_CODE=$(docker run --rm --network "$NETWORK_NAME" curlimages/curl curl -s -k -o /dev/null -w "%{http_code}" "$URL")

                if [ "$?" -ne 0 ]; then
                  echo "Error occurred while accessing $URL"
                  all_healthy=false
                  continue
                fi
                if [ "$HTTP_CODE" -ne "$EXPECTED_CODE" ]; then
                  echo "Waiting for $URL to be healthy. Current HTTP code: $HTTP_CODE"
                  all_healthy=false
                else
                  echo "$URL is healthy."
                fi
              else
                echo "Skipping check for URL ${URLS[i]} as there is no corresponding expected code."
                all_healthy=false
              fi
            done
            if [ "$all_healthy" = true ]; then
              echo "All URLs are healthy!"
              break
            fi
            sleep 1
          done



  stop-containers:
    runs-on: [self-hosted, phil-host]
    needs: health-check-containers  # Ce job dépend de la réussite du job "start-containers"
    strategy:
      matrix:
        service: [vault, consul, mongo, api-mongodb, postgresql, api-postgresql, api-gateway, frontend, reverse-proxy, minio, api-minio]
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Get version from file
        id: get_version
        run: echo "VERSION=$(cat .version)" >> $GITHUB_OUTPUT
      - name: Stop and remove containers
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          # TAG="${VERSION}-${BRANCH_NAME}"
          TAG="${BRANCH_NAME}-${VERSION}"
          # Arrêter et retirer le conteneur
          docker stop ${{ matrix.service }}-${BRANCH_NAME}-${VERSION} || true
          docker rm ${{ matrix.service }}-${BRANCH_NAME}-${VERSION} || true




  remove-network:
    runs-on: [self-hosted, phil-host]
    needs: stop-containers  # Assure que tous les conteneurs sont arrêtés et retirés avant de supprimer le réseau
    steps:
      - name: Remove Docker network
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          NETWORK_NAME="network-${BRANCH_NAME}"
          # docker network rm $NETWORK_NAME #|| true  # Ignore l'erreur si le réseau n'existe pas ou ne peut pas être supprimé
          if docker network inspect $NETWORK_NAME &> /dev/null; then
            docker network rm $NETWORK_NAME
          else
            echo "Réseau $NETWORK_NAME n'existe pas, pas besoin de le supprimer."
          fi




      # - name: Start containers
      #   run: |
      #     VERSION=${{ steps.get_version.outputs.VERSION }}
      #     BRANCH_NAME=${GITHUB_REF#refs/heads/}
      #     TAG="${VERSION}-${BRANCH_NAME}"
      #     # Extraire les variables pour le service actuel
      #     CONFIG=$(yq eval ".services.${{ matrix.service }}.env_vars" services_config.yaml)
      #     ENV_VARS=""
      #     # Générer les arguments -e pour docker run
      #     echo "$CONFIG" | yq eval '. | to_entries | .[]' | while read -r line; do
      #       key=$(echo "$line" | yq eval '.key' -)
      #       value=$(echo "$line" | yq eval '.value' -)

      #       # Remplacer les placeholders par leurs valeurs
      #       value=${value//\${BRANCH_NAME}/$BRANCH_NAME}
      #       value=${value//\${VERSION}/$VERSION}
      #       ENV_VARS+=" -e $key=\"$value\""
      #     done
      #     # Démarrer le conteneur avec les variables d'environnement
