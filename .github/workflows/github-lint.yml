name: AVR25 Rakuten MLOps - CI Lint
run-name: Linting AVR25 Rakuten MLOps actions started by ${{ github.actor }}
on:
  workflow_call:

jobs:
  lint:
    runs-on: [self-hosted, phil-host]
    strategy:
        max-parallel: 10
        matrix:
          service: [vault, api-mongodb, api-postgresql, api-gateway, api-minio, api-image-processing, api-text-processing, api-processing]
    steps:
        - name: Check out repository code
          uses: actions/checkout@v4
        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3
        - name: Setting up Python environment
          run: |
            BRANCH_NAME=${GITHUB_REF#refs/heads/}
            BRANCH_NAME=${BRANCH_NAME//\//-}
            CONTAINER_NAME="${{ matrix.service }}-${BRANCH_NAME}"
            docker exec "$CONTAINER_NAME" pip3 install --break-system-packages pylint
        - name: Linting API
          run: |
            # printing linter configuration
            echo --------------------------
            echo "Executing linter with the following error code disabled"
            echo "  - C0111: Missing docstrings"
            echo "  - R0902: Too many instance attributes"
            echo "  - W0511: Fix me"
            echo "  - W0702: No exception type(s) specified"
            echo "  - R0913: Too many arguments"
            echo "  - R0903: Too few public methods"
            echo "  - R0904: Too many public methods"
            echo "  - R0912: Too many branches"
            echo "  - R0801: Similar lines in 2 files"
            echo "  - W1514: Using open without explicitly specifying an encoding"
            echo "  - R0916: Too many boolean expressions in if statement"
            echo "  - R0901: Too many ancestors"
            echo --------------------------
            BRANCH_NAME=${GITHUB_REF#refs/heads/}
            BRANCH_NAME=${BRANCH_NAME//\//-}
            CONTAINER_NAME="${{ matrix.service }}-${BRANCH_NAME}"
            docker exec "$CONTAINER_NAME" pylint --fail-under=4 --disable=C0111,R0902,W0511,W0702,R0913,R0903,R0904,R0912,R0801,W1514,R0916,R0901 /app
