version: "1.0"
name: "infra-k8s"
description: "Infrastructure Kubernetes multi-master"
networks:
  - name: "k8s-net"
    description: "Réseau pour le cluster Kubernetes"
    type: "nat"
    subnet: "192.168.200.1/24"
    dhcp:
      start: "192.168.200.2"
      end: "192.168.200.200"
    dns:
      enabled: true
      domain: "k8s.local"
      servers: ["8.8.8.8", "8.8.4.4"]
vms:
  - name: "k8s-master1"
    cpu: 2
    ram: 8192
    disk_size: 20
    networks:
      - name: "k8s-net"
        ip: "192.168.200.10"
    clone_init:
      source_vm: "kubernetes-origin"
      meta_data:
        instance-id: k8s-master1
        local-hostname: k8s-master1
      user_data:
        #cloud-config
        autoinstall:
          version: 1
          identity:
            hostname: k8s-master1
            username: ubuntu
            password: ubuntu
          ssh:
            install-server: true
            authorized-keys:
              - "ssh-rsa  philipperisser@msn.com"
          storage:
            layout:
              name: lvm
            disks:
              - name: system
                path: "/var/lib/libvirt/images/k8s-master1.qcow2"
                size: 40
                partition: "/dev/vda3"
                resize: true
                mount_point: "/"
                filesystem: ext4
                resize_config:
                  enable: true
                  partition: '/dev/vda3'
                  disk: '/dev/vda'
                  methods:
                    fdisk: true
                    lvm: true
          network:
            version: 2
            ethernets:
              enp1s0:
                dhcp4: false
                addresses: [192.168.200.10/24]
                gateway4: 192.168.200.1
                nameservers:
                  addresses: [8.8.8.8, 8.8.4.4]
          shutdown: poweroff
    copy_files:
      - source: nginx/
        destination: /opt/
    post_install_scripts:
      - nginx/install.sh

