version: "1.0"
name: "infra-webapp"
description: "Infrastructure pour une application web avec base de données"
networks:
  - name: "app-net"
    description: "Réseau pour l'application"
    type: "nat"
    subnet: "192.168.100.1/24"
    dhcp:
      start: "192.168.100.2"
      end: "192.168.100.200"
    dns:
      enabled: true
      domain: "app.local"
      servers: ["8.8.8.8"]
vms:
  - name: "frontend"
    cpu: 4
    ram: 12288
    disk_size: 20
    networks:
      - name: "app-net"
        ip: "192.168.100.10"  # Adresse IP statique
    cloud_init:
      iso: "ubuntu-24.04.1-live-server-amd64.iso"
      meta_data:
        instance-id: frontend
        local-hostname: frontend
      user_data:
        #cloud-config
        autoinstall:
          version: 1
          identity:
            hostname: frontend
            username: ubuntu
            password: "$6$azI.phbtXYmpiU7T$pNQ7Ogdk9KWYnhPw4G/7p/VnxQ.vMmI/Xs56wWvhDmoEe7VRMRoSRhiA6cONZOU./N9WxdQmxuefaJDG4qxwU."
          ssh:
            install-server: true
            authorized-keys:
              - "ssh-rsa  Philippe-RM@github/131196788"
          storage:
            layout:
              name: lvm
          network:
            version: 2
            ethernets:
              enp1s0:
                dhcp4: false
                addresses: [192.168.100.10/24]
                gateway4: 192.168.100.1
                nameservers:
                  addresses: [8.8.8.8, 8.8.4.4]
          #TODO: Décommenter les lignes ci-dessous qui font bien l'installation de l'agent et s'occuper d'implémenter la partie hôte
          packages:
            - nginx
            - fcgiwrap
          #   - qemu-guest-agent
          shutdown: poweroff
      disks:
        - name: system
          path: "/var/lib/libvirt/images/frontend.qcow2"
          size: 20
    copy_files:
      # - source: scripts/
      #   destination: /opt/
      - source: nginx/
        destination: /opt/
    post_install_scripts:
      - ssh/enable.sh
      - nginx/install.sh


  - name: "backend"
    cpu: 4
    ram: 12288
    disk_size: 20
    networks:
      - name: "app-net"
        ip: "192.168.100.11"  # Adresse IP statique
    cloud_init:
      iso: "ubuntu-24.04.1-live-server-amd64.iso"
      meta_data:
        instance-id: backend
        local-hostname: backend
      user_data:
        #cloud-config
        autoinstall:
          version: 1
          identity:
            hostname: backend
            username: ubuntu
            password: "$6$azI.phbtXYmpiU7T$pNQ7Ogdk9KWYnhPw4G/7p/VnxQ.vMmI/Xs56wWvhDmoEe7VRMRoSRhiA6cONZOU./N9WxdQmxuefaJDG4qxwU."

          ssh:
            install-server: true
            authorized-keys:
              - "ssh-rsa  Philippe-RM@github/131196788"
          storage:
            layout:
              name: lvm
          network:
            version: 2
            ethernets:
              enp1s0:
                dhcp4: false
                addresses: [192.168.100.11/24]
                gateway4: 192.168.100.1
                nameservers:
                  addresses: [8.8.8.8, 8.8.4.4]
          #TODO: Décommenter les lignes ci-dessous qui font bien l'installation de l'agent et s'occuper d'implémenter la partie hôte
          packages:
            - nginx
            - fcgiwrap
          # packages:
          #   - qemu-guest-agent
          shutdown: poweroff
      disks:
        - name: system
          path: "/var/lib/libvirt/images/backend.qcow2"
          size: 20
    copy_files:
      # - source: scripts/
      #   destination: /opt/
      - source: nginx/
        destination: /opt/
    post_install_scripts:
      - ssh/enable.sh
      - nginx/install.sh

firewall:
  rules:
    - vm: "frontend"
      port: 80
      protocol: "tcp"
      action: "allow"
      source: "0.0.0.0/0"
    - vm: "backend"
      port: 8000
      protocol: "tcp"
      action: "allow"
      source: "192.168.100.0/24"
