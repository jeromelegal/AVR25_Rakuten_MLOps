version: "1.0"
name: "infra-webapp"
description: "Infrastructure pour une application web avec base de données"

defaults:
  vm:
    cpu: 2
    ram: 2048
    disk_size: 20
    user: "ubuntu"
  network:
    type: "nat"
    subnet: "192.168.100.0/24"

networks:
  - name: "app-net"
    description: "Réseau pour l'application"
    type: "nat"
    subnet: "192.168.100.0/24"
    dhcp:
      start: "192.168.100.10"
      end: "192.168.100.200"
    dns:
      enabled: true
      domain: "app.local"
      servers: ["8.8.8.8"]


vms:
  - name: "frontend"
    cloud_init:
      iso: "ubuntu-24.04.1-live-server-amd64.iso"
      meta_data:
        instance-id: frontend
        local-hostname: frontend
      ssh_keys:
        - "ssh-rsa  Philippe-RM@github/131196788"
      user_data:
        #cloud-config
        autoinstall:
          version: 1
          identity:
            hostname: frontend
            username: ubuntu
            password: "$6$WcwfuUSllyjL2MM3$..."
          ssh:
            install-server: true
            allow-pw: true
            authorized-keys:
              - "ssh-rsa  Philippe-RM@github/131196788"
          storage:
            layout:
              name: lvm
          runcmd:
            - "systemctl enable --now ssh"
      disks:
        - name: system
          path: "/var/lib/libvirt/images/frontend.qcow2"
          size: 20

  - name: "backend"
    cloud_init:
      iso: "ubuntu-24.04.1-live-server-amd64.iso"
      meta_data:
        instance-id: backend
        local-hostname: backend
      ssh_keys:
        - "ssh-rsa  Philippe-RM@github/131196788"
      user_data:
        #cloud-config
        autoinstall:
          version: 1
          identity:
            hostname: backend
            username: ubuntu
            password: "$6$WcwfuUSllyjL2MM3$..."
          ssh:
            install-server: true
            allow-pw: true
            authorized-keys:
              - "ssh-rsa  Philippe-RM@github/131196788"
          storage:
            layout:
              name: lvm
          runcmd:
            - "systemctl enable --now ssh"
      disks:
        - name: system
          path: "/var/lib/libvirt/images/backend.qcow2"
          size: 20




firewall:
  rules:
    - vm: "frontend"
      port: 80
      protocol: "tcp"
      action: "allow"
      source: "0.0.0.0/0"
    - vm: "backend"
      port: 8000
      protocol: "tcp"
      action: "allow"
      source: "192.168.100.0/24"
