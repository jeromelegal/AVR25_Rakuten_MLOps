services:
  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:3000"
  reverse-proxy:
    build:
      context: ./src/reverse-proxy
      dockerfile: Dockerfile
    container_name: reverse-proxy
    ports:
      - "443:443"

  api-gateway:
    build:
      context: ./src/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "9000:9000"
      
  mongodb:
    build:
      context: ./src/mongodb
      dockerfile: Dockerfile
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    volumes:
      - mongodb-volume:/data/db

  api-mongodb:
    build:
      context: ./src/api-mongodb
      dockerfile: Dockerfile
    container_name: api-mongodb
    ports:
      - "8000:8000"
    environment:
      MONGO_URI: mongodb://root:example@mongo:27017/
      VAULT_ADDR: "https://vault:8200"
      VAULT_USERNAME: "api-mongodb"
      VAULT_PASSWORD: "api-mongodb"

  postgresql:
    build:
      context: ./src/postgresql
      dockerfile: Dockerfile
    container_name: postgresql
    ports:
      - "5432:5432"
    environment:
      POSTGRESQL_USER: root
      POSTGRESQL_PASSWORD: example
      POSTGRESQL_DB: mydb
    volumes:
      - postgresql-volume:/data/postgresql

  api-postgresql:
    build:
      context: ./src/api-postgresql
      dockerfile: Dockerfile
    container_name: api-postgresql
    ports:
      - "8010:8010"
    environment:
      POSTGRESQL_URI: postgresql://root:example@postgresql:5432/mydb
      VAULT_ADDR: "https://vault:8200"
      VAULT_USERNAME: "api-postgresql"
      VAULT_PASSWORD: "api-postgresql"

  vault:
    build:
      context: ./src/vault
      dockerfile: Dockerfile
    container_name: vault
    ports:
      - "8200:8200"
    environment:
      SERVICE_NAME: "vault"
      VAULT_ADDR: "https://vault:8200"
      VAULT_USERNAME: "vault"
      VAULT_PASSWORD: "vault"
      CONSUL_ADDR: "http://consul:8500"
      CONSUL_TLS_ADDR: "http://consul:8500"
    cap_add:
      - IPC_LOCK
      - NET_ADMIN
      - NET_RAW
      
  consul:
    build: ./src/consul
    container_name: consul
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    environment:
      CONSUL_ADDR: "https://consul:8500"
      CONSUL_TLS_ADDR: "https://consul:8500"
      VAULT_ADDR: "https://vault:8200"
      VAULT_USERNAME: "consul"
      VAULT_PASSWORD: "consul"
  
  minio:
    build: ./src/minio
    container_name: minio
    ports:
      - "9011:9011"
      - "9010:9010"
    environment:
      CONSUL_ADDR: "https://consul:8500"
      CONSUL_TLS_ADDR: "https://consul:8500"
      VAULT_ADDR: "https://vault:8200"
      VAULT_USERNAME: "minio"
      VAULT_PASSWORD: "minio"
    volumes:
      - minio-volume:/data
  
  api-minio:
    build:
      context: ./src/api-minio
      dockerfile: Dockerfile
    container_name: api-minio
    ports:
      - "8020:8020"
    environment:
      VAULT_ADDR: "https://vault:8200"
      VAULT_USERNAME: "api-minio"
      VAULT_PASSWORD: "api-minio"
      ENVIRONMENT: "prod"
  
  model-downloader:
    build:
      context: ./src/model-downloader
      dockerfile: Dockerfile
    container_name: model-downloader
    environment:
      VAULT_ADDR: "https://vault:8200"
      VAULT_USERNAME: "model-downloader"
      VAULT_PASSWORD: "model-downloader"
    profiles: [setup]
    depends_on: [minio]
    volumes:
      - model-downloader-volume:/app/data

  mlflow:
    build:
      context: ./src/mlflow
      dockerfile: Dockerfile
    container_name: mlflow
    ports:
      - "5030:5000"
    environment:
      VAULT_ADDR: "https://vault:8200"
      VAULT_USERNAME: "mlflow"
      VAULT_PASSWORD: "mlflow"
  
  airflow-api-server:
    build:
      context: ./src/airflow
      dockerfile: Dockerfile
    container_name: airflow-api-server
    ports:
      - "8790:8790"
    environment:
      SERVICE_NAME: airflow-api-server
      VAULT_ADDR: "https://vault:8200"
      VAULT_USERNAME: "airflow-api-server"
      VAULT_PASSWORD: "airflow-api-server"
    command: api-server
  
  airflow-triggerer:
    build:
      context: ./src/airflow
      dockerfile: Dockerfile
    container_name: airflow-triggerer
    environment:
      SERVICE_NAME: airflow-triggerer
      VAULT_ADDR: "https://vault:8200"
      VAULT_USERNAME: "airflow-triggerer"
      VAULT_PASSWORD: "airflow-triggerer"
    command: triggerer
  
  airflow-scheduler:
    build:
      context: ./src/airflow
      dockerfile: Dockerfile
    container_name: airflow-scheduler
    environment:
      SERVICE_NAME: airflow-scheduler
      VAULT_ADDR: "https://vault:8200"
      VAULT_USERNAME: "airflow-scheduler"
      VAULT_PASSWORD: "airflow-scheduler"
    command: scheduler
  
  airflow-dag-processor:
    build:
      context: ./src/airflow
      dockerfile: Dockerfile
    container_name: airflow-dag-processor
    environment:
      SERVICE_NAME: airflow-dag-processor
      VAULT_ADDR: "https://vault:8200"
      VAULT_USERNAME: "airflow-dag-processor"
      VAULT_PASSWORD: "airflow-dag-processor"
    command: dag-processor
  
  airflow-worker:
    build:
      context: ./src/airflow
      dockerfile: Dockerfile
    container_name: airflow-worker
    environment:
      SERVICE_NAME: airflow-worker
      VAULT_ADDR: "https://vault:8200"
      VAULT_USERNAME: "airflow-worker"
      VAULT_PASSWORD: "airflow-worker"
      # Required to handle warm shutdown of the celery workers properly
      # See https://airflow.apache.org/docs/docker-stack/entrypoint.html#signal-propagation
      DUMB_INIT_SETSID: "0"
    command: worker
  
  api-image-processing:
    build:
      context: ./src/api-image-processing
      dockerfile: Dockerfile
    container_name: api-image-processing
    ports:
      - "8030:8030"
    environment:
      VAULT_ADDR: "https://vault:8200"
      VAULT_USERNAME: "api-image-processing"
      VAULT_PASSWORD: "api-image-processing"

  api-text-processing:
    build:
      context: ./src/api-text-processing
      dockerfile: Dockerfile
    container_name: api-text-processing
    ports:
      - "8040:8040"
    environment:
      VAULT_ADDR: "https://vault:8200"
      VAULT_USERNAME: "api-text-processing"
      VAULT_PASSWORD: "api-text-processing"
  
  api-processing:
    build:
      context: ./src/api-processing
      dockerfile: Dockerfile
    container_name: api-processing
    ports:
      - "8050:8050"
    environment:
      VAULT_ADDR: "https://vault:8200"
      VAULT_USERNAME: "api-processing"
      VAULT_PASSWORD: "api-processing"
  
  prometheus:
    build:
      context: ./src/prometheus
      dockerfile: Dockerfile
    container_name: prometheus
    ports:
      - "9090:9090"
    environment:
      VAULT_ADDR: "https://vault:8200"
      VAULT_USERNAME: "prometheus"
      VAULT_PASSWORD: "prometheus"
  
  grafana:
    build:
      context: ./src/grafana
      dockerfile: Dockerfile
    container_name: grafana
    ports:
      - "3030:3030"
    environment:
      VAULT_ADDR: "https://vault:8200"
      VAULT_USERNAME: "grafana"
      VAULT_PASSWORD: "grafana"
  
  alertmanager:
    build:
      context: ./src/alertmanager
      dockerfile: Dockerfile
    container_name: alertmanager
    ports:
      - "9093:9093"
    environment:
      VAULT_ADDR: "https://vault:8200"
      VAULT_USERNAME: "alertmanager"
      VAULT_PASSWORD: "alertmanager"

  redis:
    build:
      context: ./src/redis
      dockerfile: Dockerfile
    container_name: redis
    ports:
      - "6379:6379"
    environment:
      VAULT_ADDR: "https://vault:8200"
      VAULT_USERNAME: "redis"
      VAULT_PASSWORD: "redis"
  
  # zookeeper:
  #   build:
  #     context: ./src/zookeeper
  #     dockerfile: Dockerfile
  #   container_name: zookeeper
  #   ports:
  #     - "2181:2181"
  #   # volumes:
  #   #   - ./src/sources.list:/etc/apt/sources.list
  #   environment:
  #     ZOOKEEPER_CLIENT_PORT: 2181
  #     ZOOKEEPER_TICK_TIME: 2000

volumes:
  minio-volume:
  mongodb-volume:
  postgresql-volume:
  model-downloader-volume:
