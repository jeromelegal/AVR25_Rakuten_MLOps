# =====================================================================
# Registry mirror (Python) — extraction/pull/tag/push/réécriture YAML
# Utilise files/registry_mirror.py (copié en local puis exécuté)
# =====================================================================
- name: Registry mirror — préparer & exécuter le script Python
  vars:
    # --- Registry local à annoncer dans les manifests réécrits (host:port) ---
    registry_advertise: "192.168.200.1:5000"   # ⚠️ à adapter
    # --- Répertoires & fichiers de travail (côté machine Ansible/localhost) ---
    workspace_dir: "./registry-mirror"
    rendered_manifests_dir: "./templates"     # dossier qui contient les YAML rendus à analyser
    rewritten_manifests_dir: "./rendered_local"
    images_file: "{{ workspace_dir }}/images.txt"
    mapping_file: "{{ workspace_dir }}/mapping.json"
    # --- Exécutables/Options d’exécution ---
    python_executable: "python3"
    pip_executable: "pip3"
    docker_use_sudo: false     # true si 'docker' nécessite sudo (le script reçoit --sudo)
    # --- Actions à exécuter par le script ---
    do_pull: true              # extraire/pull les images manquantes
    do_push: true              # pousser vers le registry local
    do_rewrite: true           # réécrire les manifests (sortie dans rewritten_manifests_dir)
    # --- Fichier source du script (dans ton dépôt Ansible) ---
    registry_mirror_src: "{{ playbook_dir }}/files/registry_mirror.py"
    # --- Configuration du registry Docker ---
    registry_config_path: "/etc/docker/registry/config.yml"
    registry_data_path: "/var/lib/registry"
    registry_config_dir: "/etc/docker/registry"
  block:
    # Garde-fou sur la variable d’entrée
    - name: Assert required input directory is provided
      assert:
        that:
          - rendered_manifests_dir is defined
          - rendered_manifests_dir | length > 0
        fail_msg: "Variable 'rendered_manifests_dir' doit pointer vers le dossier contenant les YAML rendus."
      delegate_to: localhost
      run_once: true
      tags: [registry_mirror, images]
    - name: Check rendered_manifests_dir exists
      stat:
        path: "{{ rendered_manifests_dir }}"
      register: rendered_dir_stat
      delegate_to: localhost
      run_once: true
      tags: [registry_mirror, images]
    - name: Fail if rendered_manifests_dir does not exist
      fail:
        msg: "Le dossier '{{ rendered_manifests_dir }}' n'existe pas."
      when: not rendered_dir_stat.stat.exists
      delegate_to: localhost
      run_once: true
      tags: [registry_mirror, images]
    # Dépendance PyYAML (pip user, silencieux si déjà installé)
    - name: Ensure PyYAML present (pip user)
      pip:
        name: pyyaml
        executable: "{{ pip_executable }}"
        extra_args: --user
      delegate_to: localhost
      run_once: true
      changed_when: false
      failed_when: false
      tags: [registry_mirror, images]
    # Vérification Docker (utilise sudo si demandé)
    - name: Check docker is available locally
      command: docker info
      register: docker_info
      delegate_to: localhost
      run_once: true
      changed_when: false
      failed_when: docker_info.rc != 0
      become: "{{ docker_use_sudo | bool }}"
      tags: [registry_mirror, images]
    # Configuration et lancement du registry Docker
    - name: Ensure registry data directory exists
      file:
        path: "{{ registry_data_path }}"
        state: directory
        mode: "0755"
      delegate_to: localhost
      run_once: true
      tags: [registry_mirror, images]
    - name: Ensure registry config directory exists
      file:
        path: "{{ registry_config_dir }}"
        state: directory
        mode: "0755"
      delegate_to: localhost
      run_once: true
      tags: [registry_mirror, images]
    - name: Copy registry configuration file
      copy:
        content: |
          version: 0.1
          log:
            fields:
              service: registry
          storage:
            delete:
              enabled: true
            filesystem:
              rootdirectory: {{ registry_data_path }}
          http:
            addr: 0.0.0.0:5000
            headers:
              X-Content-Type-Options: [nosniff]
        dest: "{{ registry_config_path }}"
        mode: "0644"
      delegate_to: localhost
      run_once: true
      tags: [registry_mirror, images]
    - name: Pull Docker registry image
      docker_image:
        name: registry
        tag: 2
        source: pull
      delegate_to: localhost
      run_once: true
      tags: [registry_mirror, images]
    - name: Run Docker registry container
      docker_container:
        name: registry
        image: registry:2
        state: started
        restart_policy: always
        ports:
          - "5000:5000"
        volumes:
          - "{{ registry_data_path }}:{{ registry_data_path }}"
          - "{{ registry_config_path }}:/etc/docker/registry/config.yml"
        detach: true
      delegate_to: localhost
      run_once: true
      tags: [registry_mirror, images]
    - name: Verify registry is running
      uri:
        url: http://localhost:5000/v2/_catalog
        method: GET
        return_content: yes
      register: registry_status
      until: registry_status.status == 200
      retries: 5
      delay: 10
      delegate_to: localhost
      run_once: true
      tags: [registry_mirror, images]
    # Dossiers + déploiement du script
    - name: Ensure local workspace and output directories exist
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ workspace_dir }}"
        - "{{ rewritten_manifests_dir }}"
      delegate_to: localhost
      run_once: true
      tags: [registry_mirror, images]
    - name: Check registry_mirror.py source exists in repo
      stat:
        path: "{{ registry_mirror_src }}"
      register: mirror_src_stat
      delegate_to: localhost
      run_once: true
      tags: [registry_mirror, images]
    - name: Fail if registry_mirror.py is missing
      fail:
        msg: "Fichier introuvable: {{ registry_mirror_src }} (attendu dans files/registry_mirror.py)."
      when: not mirror_src_stat.stat.exists
      delegate_to: localhost
      run_once: true
      tags: [registry_mirror, images]
    - name: Deploy registry_mirror.py to workspace
      copy:
        src: "{{ registry_mirror_src }}"
        dest: "{{ workspace_dir }}/registry_mirror.py"
        mode: "0755"
      delegate_to: localhost
      run_once: true
      tags: [registry_mirror, images]
    # Exécution du script Python (pull/push/réécriture)
    - name: Run registry mirror script with logging
      shell: >
        {{ python_executable }} {{ workspace_dir }}/registry_mirror.py
        --manifests {{ rendered_manifests_dir | quote }}
        --images-file {{ images_file | quote }}
        --registry {{ registry_advertise | quote }}
        --rewrite-out {{ rewritten_manifests_dir | quote }}
        --mapping-file {{ mapping_file | quote }}
        {% if do_pull | bool %} --pull {% endif %}
        {% if do_push | bool %} --push {% endif %}
        {% if do_rewrite | bool %} --rewrite {% endif %}
        {% if docker_use_sudo | bool %} --sudo {% endif %}
      args:
        executable: /bin/bash
      register: mirror_py
      delegate_to: localhost
      run_once: true
      changed_when: >
        ('PUSHED ' in (mirror_py.stdout | default(''))) or
        ('REWROTE manifests' in (mirror_py.stdout | default(''))) or
        ('WROTE images list' in (mirror_py.stdout | default('')))
      tags: [registry_mirror, images]
    - name: Show mirror summary
      debug:
        msg: "{{ mirror_py.stdout | default('') }}"
      when: mirror_py is defined
      delegate_to: localhost
      run_once: true
      tags: [registry_mirror, images]
