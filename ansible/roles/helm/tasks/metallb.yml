---
# roles/helm/tasks/metallb_render.yml
- name: MetalLB — Génération des manifests
  vars:
    metallb_namespace: "metallb-system"
    metallb_version: "0.13.12"
    render_dir: "/etc/helm/rendered/metallb"
    download_dir: "{{ playbook_dir }}/templates/metallb-rendered"
  block:
    # 1. Créer les répertoires
    - name: Créer les répertoires
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ render_dir }}"
        - "{{ download_dir }}"
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      when: item.startswith('/etc/')

    - name: Créer les répertoires locaux
      file:
        path: "{{ download_dir }}"
        state: directory
        mode: "0755"
      run_once: true
      delegate_to: localhost
      become: no

    # 2. Configurer le dépôt Helm
    - name: Configurer le dépôt MetalLB
      shell: |
        set -euo pipefail
        helm repo add metallb https://metallb.github.io/metallb || true
        helm repo update
      args:
        executable: /bin/bash
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes

    # 3. Générer le manifest complet
    - name: Générer le manifest MetalLB
      shell: |
        set -euo pipefail
        helm template metallb metallb/metallb \
          --version {{ metallb_version }} \
          --namespace {{ metallb_namespace }} \
          --include-crds \
          > "{{ render_dir }}/metallb-combined.yaml"
      args:
        executable: /bin/bash
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes

    # 4. Extraire les CRDs avec une méthode robuste
    - name: Extraire les CRDs avec yq (version 4)
      shell: |
        set -euo pipefail
        # Utiliser yq pour extraire proprement les CRDs
        yq 'select(.kind == "CustomResourceDefinition")' "{{ render_dir }}/metallb-combined.yaml" > "{{ render_dir }}/metallb-crds.yaml"
      args:
        executable: /bin/bash
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes

    # 5. Vérifier et corriger le fichier CRDs
    - name: Vérifier et corriger le fichier CRDs
      shell: |
        set -euo pipefail
        # Vérifier que le fichier est valide
        if ! yq eval '.' {{ render_dir }}/metallb-crds.yaml >/dev/null 2>&1; then
          # Si invalide, utiliser une méthode alternative
          grep -A 50 'kind: CustomResourceDefinition' {{ render_dir }}/metallb-combined.yaml | \
          awk '/kind: CustomResourceDefinition/,/^---$/{print}' | \
          sed '/^---$/d' > {{ render_dir }}/metallb-crds.yaml
        fi
        # Vérifier que le fichier se termine correctement
        if [ -s {{ render_dir }}/metallb-crds.yaml ] && [ "$(tail -c1 {{ render_dir }}/metallb-crds.yaml)" != "" ]; then
          echo "" >> {{ render_dir }}/metallb-crds.yaml
        fi
      args:
        executable: /bin/bash
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes

    # 6. Rapatrier les fichiers
    - name: Rapatrier les manifests
      fetch:
        src: "{{ render_dir }}/{{ item.src }}"
        dest: "{{ download_dir }}/{{ item.dest }}"
        flat: yes
      loop:
        - { src: "metallb-crds.yaml", dest: "metallb-crds.yaml" }
        - { src: "metallb-combined.yaml", dest: "metallb-combined.yaml" }
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
  tags: [metallb, render]
