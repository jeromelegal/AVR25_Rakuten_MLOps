---
# roles/kubernetes/tasks/mayastor_render.yml
- name: Mayastor — Génération des manifests YAML
  vars:
    mayastor_namespace: openebs
    data_node_group: datas
    mayastor_disk_device_default: "/dev/nvme0n2"
    render_dir: "/etc/helm/rendered/mayastor"
    download_dir: "{{ playbook_dir }}/templates/mayastor-rendered"
  block:
    # 1. Créer les répertoires
    - name: Créer les répertoires
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ render_dir }}"
        - "{{ download_dir }}"
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      tags: [mayastor, render]

    - name: Créer les répertoires locaux
      file:
        path: "{{ download_dir }}"
        state: directory
        mode: "0755"
      run_once: true
      delegate_to: localhost
      become: no
      tags: [mayastor, render]

    # 2. Configurer le dépôt Helm
    - name: Ajouter le dépôt OpenEBS
      command: helm repo add openebs https://openebs.github.io/openebs
      register: helm_repo_add
      changed_when: "'has been added' in helm_repo_add.stdout or 'already exists' in helm_repo_add.stderr"
      environment: { KUBECONFIG: "/etc/kubernetes/admin.conf" }
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      tags: [mayastor, render]

    - name: Mettre à jour les dépôts Helm
      command: helm repo update
      changed_when: false
      environment: { KUBECONFIG: "/etc/kubernetes/admin.conf" }
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      tags: [mayastor, render]

    # 3. Générer les manifests avec namespace forcé
    - name: Générer le fichier values pour Mayastor
      copy:
        dest: "{{ render_dir }}/mayastor-values.yaml"
        content: |
          mayastor:
            tolerations:
              - key: "openebs.io/storage"
                operator: "Equal"
                value: "mayastor"
                effect: "NoSchedule"
            csi:
              node:
                topology:
                  nodeSelector: true
                  segments:
                    openebs.io/csi-node: mayastor
          # Désactiver les composants non nécessaires
          localpv-provisioner:
            enabled: false
          minio:
            enabled: false
          openebs-api:
            enabled: false
          ndm:
            enabled: false
          ndm-operator:
            enabled: false
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      tags: [mayastor, render]

    - name: Générer le manifest OpenEBS avec namespace forcé
      shell: |
        set -euo pipefail
        helm template openebs openebs/openebs \
          -n {{ mayastor_namespace }} \
          --set engines.local.lvm.enabled=false \
          --set engines.local.zfs.enabled=false \
          --set engines.replicated.mayastor.enabled=true \
          --set localpv-provisioner.enabled=false \
          --set minio.enabled=false \
          --set openebs-api.enabled=false \
          --set ndm.enabled=false \
          --set ndm-operator.enabled=false \
          -f {{ render_dir }}/mayastor-values.yaml \
          | sed 's/namespace: default/namespace: {{ mayastor_namespace }}/g' \
          > "{{ render_dir }}/openebs.yaml"
      args:
        executable: /bin/bash
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      tags: [mayastor, render]

    # 4. Générer les manifests supplémentaires
    - name: Générer le manifest StorageClass
      copy:
        dest: "{{ render_dir }}/storageclasses.yaml"
        content: |
          apiVersion: storage.k8s.io/v1
          kind: StorageClass
          metadata:
            name: mayastor-1
            namespace: {{ mayastor_namespace }}
          provisioner: io.openebs.csi-mayastor
          allowVolumeExpansion: true
          volumeBindingMode: WaitForFirstConsumer
          parameters:
            protocol: nvmf
            repl: "1"
          ---
          apiVersion: storage.k8s.io/v1
          kind: StorageClass
          metadata:
            name: mayastor-3
            namespace: {{ mayastor_namespace }}
          provisioner: io.openebs.csi-mayastor
          allowVolumeExpansion: true
          volumeBindingMode: WaitForFirstConsumer
          parameters:
            protocol: nvmf
            repl: "3"
            thin: "true"
            ioTimeout: "30"
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      tags: [mayastor, render]

    - name: Générer les manifests DiskPool
      vars:
        target_dev: "{{ hostvars[item].mayastor_disk_device | default(mayastor_disk_device_default) }}"
        pool_yaml: |
          apiVersion: openebs.io/v1beta3
          kind: DiskPool
          metadata:
            name: pool-{{ item }}
            namespace: {{ mayastor_namespace }}
          spec:
            node: {{ item }}
            disks:
              - {{ target_dev }}
      copy:
        dest: "{{ render_dir }}/diskpool-{{ item }}.yaml"
        content: "{{ pool_yaml }}"
      loop: "{{ groups[data_node_group] | default([]) }}"
      when: groups[data_node_group] is defined and groups[data_node_group] | length > 0
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      tags: [mayastor, render]

    # 5. Rapatrier les fichiers
    - name: Rapatrier les manifests
      fetch:
        src: "{{ render_dir }}/{{ item.src }}"
        dest: "{{ download_dir }}/{{ item.dest }}"
        flat: yes
      loop:
        - { src: "openebs.yaml", dest: "openebs.yaml" }
        - { src: "mayastor-values.yaml", dest: "mayastor-values.yaml" }
        - { src: "storageclasses.yaml", dest: "storageclasses.yaml" }
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      tags: [mayastor, render]

    - name: Rapatrier les DiskPools
      fetch:
        src: "{{ render_dir }}/diskpool-{{ item }}.yaml"
        dest: "{{ download_dir }}/diskpool-{{ item }}.yaml"
        flat: yes
      loop: "{{ groups[data_node_group] | default([]) }}"
      when: groups[data_node_group] is defined and groups[data_node_group] | length > 0
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      tags: [mayastor, render]
  tags: [mayastor, render]
