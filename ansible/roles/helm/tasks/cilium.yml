---
# roles/helm/tasks/cilium_render_and_fetch.yml
- name: Cilium — génération + rapatriement
  vars:
    kube_system_ns: "kube-system"
    cilium_version: "1.18.2"
    render_dir: "/etc/helm/rendered/cilium"
    download_dir: "{{ playbook_dir }}/templates/cilium-rendered"
    # upload_dir: "{{ playbook_dir }}/rendered_local/cilium"
    cilium_manifests:
      phase1: "{{ render_dir }}/cilium-phase1.yaml"
      phase2: "{{ render_dir }}/cilium-phase2-kpr.yaml"
      phase3: "{{ render_dir }}/cilium-phase3-hubble.yaml"
  block:
    # 1. Créer les répertoires
    - name: Créer les répertoires (remote)
      file:
        path: "{{ render_dir }}"
        state: directory
        mode: "0755"
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes

    - name: Créer les répertoires (local)
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ download_dir }}"
        # - "{{ upload_dir }}"
      run_once: true
      delegate_to: localhost

    # 2. Configurer le dépôt Helm
    - name: Configurer le dépôt Cilium
      shell: |
        set -euo pipefail
        helm repo add cilium https://helm.cilium.io || true
        helm repo update
      args:
        executable: /bin/bash
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes

    # 3. Générer les manifests
    - name: Rendre le manifest Cilium (phase 1)
      shell: |
        set -euo pipefail
        helm template cilium cilium/cilium \
          --version {{ cilium_version }} \
          --namespace {{ kube_system_ns }} \
          --set-string kubeProxyReplacement="false" \
          --set ipam.mode=cluster-pool \
          --set ipam.operator.clusterPoolIPv4PodCIDRList='["10.244.0.0/16"]' \
          --set ipam.operator.clusterPoolIPv4MaskSize=24 \
          > "{{ cilium_manifests.phase1 }}"
      args:
        executable: /bin/bash
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes

    - name: Rendre le manifest Cilium (phase 2 - kube-proxy replacement)
      shell: |
        set -euo pipefail
        helm template cilium cilium/cilium \
          --version {{ cilium_version }} \
          --namespace {{ kube_system_ns }} \
          --set-string kubeProxyReplacement="true" \
          --set ipam.mode=kubernetes \
          > "{{ cilium_manifests.phase2 }}"
      args:
        executable: /bin/bash
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes

    - name: Rendre le manifest Cilium (phase 3 - Hubble)
      shell: |
        set -euo pipefail
        helm template cilium cilium/cilium \
          --version {{ cilium_version }} \
          --namespace {{ kube_system_ns }} \
          --set hubble.enabled=true \
          --set hubble.relay.enabled=true \
          --set hubble.ui.enabled=true \
          --set hubble.metrics.enabled="{enabled=true,port=9090,serviceMonitor.enabled=false}" \
          > "{{ cilium_manifests.phase3 }}"
      args:
        executable: /bin/bash
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes

    # 4. Rapatrier les fichiers
    - name: Rapatrier les manifests Cilium
      fetch:
        src: "{{ render_dir }}/{{ item.src }}"
        dest: "{{ download_dir }}/{{ item.dest }}"
        flat: yes
      loop:
        - { src: "cilium-phase1.yaml", dest: "cilium-phase1.yaml" }
        - { src: "cilium-phase2-kpr.yaml", dest: "cilium-phase2-kpr.yaml" }
        - { src: "cilium-phase3-hubble.yaml", dest: "cilium-phase3-hubble.yaml" }
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes

    # # 5. Préparer les fichiers pour upload
    # - name: Copier les fichiers dans upload_dir
    #   copy:
    #     src: "{{ download_dir }}/{{ item.src }}"
    #     dest: "{{ upload_dir }}/{{ item.dest }}"
    #     remote_src: yes
    #   loop:
    #     - { src: "cilium-phase1.yaml", dest: "cilium-phase1.yaml" }
    #     - { src: "cilium-phase2-kpr.yaml", dest: "cilium-phase2-kpr.yaml" }
    #     - { src: "cilium-phase3-hubble.yaml", dest: "cilium-phase3-hubble.yaml" }
    #   run_once: true
    #   delegate_to: localhost
  tags: [cilium, render]
