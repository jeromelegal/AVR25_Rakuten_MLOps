- name: Install Helm (idempotent)
  block:
    - name: Check if Helm binary exists
      stat:
        path: /usr/local/bin/helm
      register: helm_binary

    - name: Create /usr/local/bin directory if it doesn't exist
      file:
        path: /usr/local/bin
        state: directory
        mode: '0755'
      when: not helm_binary.stat.exists

    - name: Download and install Helm
      get_url:
        url: https://get.helm.sh/helm-v3.14.0-linux-amd64.tar.gz
        dest: /tmp/helm.tar.gz
        mode: '0755'
      when: not helm_binary.stat.exists

    - name: Extract Helm
      unarchive:
        src: /tmp/helm.tar.gz
        dest: /tmp
        remote_src: yes
      when: not helm_binary.stat.exists

    - name: Install Helm binary
      command: cp /tmp/linux-amd64/helm /usr/local/bin/helm
      when: not helm_binary.stat.exists

    - name: Set executable permissions
      file:
        path: /usr/local/bin/helm
        mode: '0755'
      when: not helm_binary.stat.exists
  delegate_to: "{{ groups['masters'][0] }}"
  run_once: true
  become: yes
  tags: helm
