---
# Fichier: roles/kubernetes/tasks/install.yml
# Description: Ce fichier Ansible installe et configure un cluster Kubernetes avec des nœuds de contrôle, de données et de travailleurs.

# Configuration initiale
- name: Gather all facts
  setup:
  tags: install

# Configuration des hosts pour tous les nœuds
- name: Configure /etc/hosts with cluster domain
  block:
    # Crée une sauvegarde du fichier /etc/hosts avant de le modifier
    - name: Create /etc/hosts backup
      copy:
        src: /etc/hosts
        dest: /etc/hosts.bak
        remote_src: yes

    # Ajoute l'endpoint du plan de contrôle à /etc/hosts
    - name: Add control plane endpoint to /etc/hosts
      lineinfile:
        path: /etc/hosts
        line: "{{ kubeadm_advertise_address }} {{ kubeadm_control_plane_endpoint }} {{ kubeadm_control_plane_endpoint }}.{{ dns_domain }}"
        state: present
        create: yes

    # Ajoute tous les maîtres à /etc/hosts
    - name: Add all masters to /etc/hosts
      lineinfile:
        path: /etc/hosts
        line: "{{ hostvars[item].ansible_host | default(hostvars[item].ansible_all_ipv4_addresses[0]) }} {{ item }} {{ item }}.{{ dns_domain }}"
        state: present
      when: item in groups['masters'] | default([])
      loop: "{{ groups['masters'] | default([]) }}"

    # Ajoute tous les travailleurs à /etc/hosts
    - name: Add all workers to /etc/hosts
      lineinfile:
        path: /etc/hosts
        line: "{{ hostvars[item].ansible_host | default(hostvars[item].ansible_all_ipv4_addresses[0]) }} {{ item }} {{ item }}.{{ dns_domain }}"
        state: present
      when: item in groups['workers'] | default([])
      loop: "{{ groups['workers'] | default([]) }}"
  tags: install

# Configuration réseau
- name: Configure network for Kubernetes
  block:
    # Configure les paramètres sysctl pour le forwarding IPv4 et les appels iptables/ip6tables
    - name: Configure sysctl for IPv4 forwarding
      copy:
        dest: /etc/sysctl.d/k8s.conf
        content: |
          net.ipv4.ip_forward = 1
          net.bridge.bridge-nf-call-iptables = 1
          net.bridge.bridge-nf-call-ip6tables = 1

    # Applique les paramètres sysctl
    - name: Apply sysctl settings
      command: sysctl --system
  tags: install

# Installation des prérequis système
# Installe les paquets de base nécessaires pour Kubernetes
- name: Install base packages
  apt:
    name: "{{ item }}"
    state: present
    update_cache: yes
  loop:
    - apt-transport-https
    - ca-certificates
    - curl
    - gnupg
    - lsb-release
    - software-properties-common
    - uidmap
  tags: install

# Installation et configuration de containerd
- name: Install containerd
  block:
    # Ajoute la clé GPG de Docker pour le dépôt
    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    # Ajoute le dépôt Docker
    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    # Installe containerd.io
    - name: Install containerd.io
      apt:
        name: containerd.io
        state: present
        update_cache: yes

    # Arrête le service containerd s'il est en cours d'exécution
    - name: Stop containerd service
      systemd:
        name: containerd
        state: stopped
      ignore_errors: yes

    # Crée les répertoires de configuration pour containerd
    - name: Create containerd config directories
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - /etc/containerd
        - /etc/systemd/system/containerd.service.d

    # Génère la configuration par défaut de containerd
    - name: Generate default containerd config
      shell: containerd config default > /etc/containerd/config.toml
      args:
        creates: /etc/containerd/config.toml

    # Configure containerd pour Kubernetes
    - name: Configure containerd for Kubernetes
      copy:
        dest: /etc/containerd/config.toml
        content: |
          version = 2
          [plugins."io.containerd.runtime.v1.linux"]
            [plugins."io.containerd.runtime.v1.linux".runtimes]
              [plugins."io.containerd.runtime.v1.linux".runtimes.runc]
                runtime_type = "io.containerd.runc.v2"
          [plugins."io.containerd.grpc.v1.cri"]
            disable = false
            sandbox_image = "registry.k8s.io/pause:3.10.1"
            [plugins."io.containerd.grpc.v1.cri".containerd]
              [plugins."io.containerd.grpc.v1.cri".containerd.runtimes]
                [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc]
                  runtime_type = "io.containerd.runc.v2"
                  [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc.options]
                    SystemdCgroup = true
            [plugins."io.containerd.grpc.v1.cri".registry]
              [plugins."io.containerd.grpc.v1.cri".registry.mirrors]
                [plugins."io.containerd.grpc.v1.cri".registry.mirrors."docker.io"]
                  endpoint = ["https://registry-1.docker.io"]
                [plugins."io.containerd.grpc.v1.cri".registry.mirrors."registry.k8s.io"]
                  endpoint = ["https://registry.k8s.io"]

    # Configure le service systemd pour containerd
    - name: Configure containerd systemd service
      copy:
        dest: /etc/systemd/system/containerd.service.d/override.conf
        content: |
          [Service]
          ExecStartPre=/sbin/modprobe overlay
          ExecStartPre=/sbin/modprobe br_netfilter

    # Recharge le démon systemd
    - name: Reload systemd daemon
      systemd:
        daemon_reload: yes

    # Démarre et active le service containerd
    - name: Start containerd service
      systemd:
        name: containerd
        state: started
        enabled: yes

    # Vérifie que containerd est en cours d'exécution
    - name: Verify containerd is running
      systemd:
        name: containerd
        state: started

    # Télécharge le binaire crictl
    - name: Download crictl binary
      get_url:
        url: https://github.com/kubernetes-sigs/cri-tools/releases/download/v1.30.0/crictl-v1.30.0-linux-amd64.tar.gz
        dest: /tmp/crictl.tar.gz
        mode: '0755'

    # Extrait le binaire crictl
    - name: Extract crictl binary
      unarchive:
        src: /tmp/crictl.tar.gz
        dest: /usr/local/bin/
        remote_src: yes

    # Définit les permissions pour crictl
    - name: Set crictl permissions
      file:
        path: /usr/local/bin/crictl
        mode: '0755'
        owner: root
        group: root

    # Configure crictl
    - name: Configure crictl
      copy:
        dest: /etc/crictl.yaml
        content: |
          runtime-endpoint: unix:///var/run/containerd/containerd.sock
          image-endpoint: unix:///var/run/containerd/containerd.sock
          timeout: 10
          debug: false
  tags: install

# Configuration du dépôt Kubernetes (1.34)
# Ajoute la clé GPG de Kubernetes
- name: Add Kubernetes GPG key
  apt_key:
    url: https://pkgs.k8s.io/core:/stable:/v1.34/deb/Release.key
    keyring: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
    state: present
  tags: install

# Ajoute le dépôt Kubernetes
- name: Add Kubernetes repository
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.34/deb/ /"
    state: present
    filename: kubernetes
  tags: install

# Installation des composants Kubernetes (1.34)
# Installe les composants Kubernetes (kubelet, kubeadm, kubectl)
- name: Install Kubernetes components
  apt:
    name: "{{ item }}"
    state: present
    allow_downgrade: yes
  loop:
    - kubelet=1.34.0-1.1
    - kubeadm=1.34.0-1.1
    - kubectl=1.34.0-1.1
  tags: install

# Crée le répertoire de configuration pour kubelet
- name: Create kubelet config directory
  file:
    path: /var/lib/kubelet
    state: directory
    mode: '0755'

# Configure kubelet pour utiliser systemd comme gestionnaire de cgroups et containerd comme runtime de conteneurs
- name: Configure kubelet
  copy:
    dest: /var/lib/kubelet/config.yaml
    content: |
      apiVersion: kubelet.config.k8s.io/v1beta1
      kind: KubeletConfiguration
      cgroupDriver: systemd
      containerRuntimeEndpoint: "unix:///var/run/containerd/containerd.sock"
      # Ajoutez d'autres configurations nécessaires ici

# Configuration du système pour Kubernetes
- name: Configure kernel modules
  block:
    # Charge les modules noyau nécessaires pour Kubernetes
    - name: Load kernel modules
      modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - br_netfilter
        - overlay
        - ip_vs
        - ip_vs_rr
        - ip_vs_wrr
        - ip_vs_sh
        - nf_conntrack

    # Rend les modules noyau persistants
    - name: Persist kernel modules
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          br_netfilter
          overlay
          ip_vs
          ip_vs_rr
          ip_vs_wrr
          ip_vs_sh
          nf_conntrack
  tags: install

# Vérifie l'état de la swap
- name: Disable swap
  block:
    - name: Check swap status
      command: swapon --show
      register: swap_status
      changed_when: false
      ignore_errors: yes

    # Désactive la swap si elle est active
    - name: Disable active swap
      command: swapoff -a
      when: swap_status.rc == 0

    # Supprime la swap du fichier fstab
    - name: Remove swap from fstab
      replace:
        path: /etc/fstab
        regexp: '^([^#].*?\sswap\s.*)$'
        replace: '# \1'
      when: swap_status.rc == 0
  tags: install

# Configuration spécifique pour kubelet
- name: Configure kubelet for containerd
  block:
    # Crée le répertoire de configuration pour kubelet
    - name: Create kubelet config directory
      file:
        path: /etc/default
        state: directory
        mode: '0755'

    # Configure les arguments supplémentaires pour kubelet
    - name: Configure kubelet extra args
      copy:
        dest: /etc/default/kubelet
        content: |
          KUBELET_EXTRA_ARGS="--cgroup-driver=systemd --container-runtime-endpoint=unix:///var/run/containerd/containerd.sock"
  tags: install

# Redémarre et active kubelet
- name: Restart kubelet
  systemd:
    name: kubelet
    state: restarted
    enabled: yes
    daemon_reload: yes
  tags: install

# Initialisation du cluster
- name: Initialize Kubernetes cluster
  block:
    # Crée le répertoire de configuration pour kubeadm sur le premier maître
    - name: Create kubeadm config directory
      file:
        path: /etc/kubernetes
        state: directory
        mode: '0755'
      when: inventory_hostname == groups['masters'][0]

    # Génère la configuration pour kubeadm sur le premier maître
    - name: Generate kubeadm config
      template:
        src: templates/kubeadm-config.yaml.j2
        dest: /etc/kubernetes/kubeadm-config.yaml
        owner: root
        group: root
        mode: '0644'
      when: inventory_hostname == groups['masters'][0]

    # Télécharge les images Kubernetes sur le premier maître
    - name: Pull Kubernetes images
      command: kubeadm config images pull --config /etc/kubernetes/kubeadm-config.yaml
      when: inventory_hostname == groups['masters'][0]

    # Réinitialise kubeadm
    - name: Reset kubeadm 
      command: kubeadm reset -f
      register: reset_cp
      failed_when: false
      changed_when: "'[reset]' in reset_cp.stdout or reset_cp.stderr"
      

    # Démarre et active kubelet sur le premier maître
    - name: Start kubelet on master1
      systemd:
        name: kubelet
        state: started
        enabled: yes
      when: inventory_hostname == groups['masters'][0]

    # Initialise le cluster sur le premier maître
    - name: Initialize cluster
      command: kubeadm init --config /etc/kubernetes/kubeadm-config.yaml --upload-certs
      register: kubeadm_init
      when: inventory_hostname == groups['masters'][0]

    # Crée le répertoire .kube pour le premier maître
    - name: Create .kube directory
      file:
        path: /root/.kube
        state: directory
        mode: '0755'
      when: inventory_hostname == groups['masters'][0]

    # Copie la configuration admin pour kubectl sur le premier maître
    - name: Copy admin config
      copy:
        src: /etc/kubernetes/admin.conf
        dest: /root/.kube/config
        remote_src: yes
        owner: root
        group: root
        mode: '0644'
      when: inventory_hostname == groups['masters'][0]

    # Génère la clé de certificat
    - name: Get certificate key
      command: kubeadm certs certificate-key
      register: cert_key
      when: inventory_hostname == groups['masters'][0]

    # Définit le fait pour la clé de certificat
    - name: Set certificate key fact
      set_fact:
        kube_cert_key: "{{ cert_key.stdout }}"
      when: inventory_hostname == groups['masters'][0]

    # Génère la commande de jointure pour les nœuds de contrôle
    - name: Generate join command for control plane nodes
      command: kubeadm token create --print-join-command --certificate-key {{ kube_cert_key }}
      register: control_plane_join_command
      when: inventory_hostname == groups['masters'][0]

    # Génère la commande de jointure pour les nœuds de travailleurs
    - name: Generate join command for worker nodes
      command: kubeadm token create --print-join-command
      register: worker_join_command
      when: inventory_hostname == groups['masters'][0]

    # Génère la commande de jointure pour les nœuds de données
    - name: Generate join command for data nodes
      command: kubeadm token create --print-join-command
      register: data_join_command
      when: inventory_hostname == groups['masters'][0]

    # Définit les faits pour les commandes de jointure
    - name: Set join command facts
      set_fact:
        kube_control_plane_join_command: "{{ control_plane_join_command.stdout }}"
        kube_worker_join_command: "{{ worker_join_command.stdout }}"
        kube_network_join_command: "{{ network_join_command.stdout }}"
        kube_data_join_command: "{{ data_join_command.stdout }}"
      when: inventory_hostname == groups['masters'][0]

    # Réinitialise kubeadm sur les maîtres supplémentaires si nécessaire
    - name: Reset kubeadm on additional masters if previously attempted
      command: kubeadm reset -f
      register: reset_cp
      failed_when: false
      changed_when: "'[reset]' in reset_cp.stdout or reset_cp.stderr"
      when: inventory_hostname in groups['masters'][1:]

    # Nettoie le répertoire PKI sur les maîtres supplémentaires
    - name: Ensure PKI dir is clean on additional masters
      file:
        path: /etc/kubernetes/pki
        state: absent
      when: inventory_hostname in groups['masters'][1:]

    # Recrée le répertoire PKI sur les maîtres supplémentaires
    - name: Recreate PKI dir
      file:
        path: /etc/kubernetes/pki
        state: directory
        mode: '0755'
      when: inventory_hostname in groups['masters'][1:]

    # Télécharge les certificats du plan de contrôle avec la clé générée
    - name: Upload control-plane certs with the generated key
      command: kubeadm init phase upload-certs --upload-certs --certificate-key {{ kube_cert_key }}
      when: inventory_hostname == groups['masters'][0]
  tags: install

# Jointure des nœuds
# Joint les nœuds de contrôle supplémentaires au cluster
- name: Join additional master nodes
  command: "{{ hostvars[groups['masters'][0]]['kube_control_plane_join_command'] }}"
  register: join_result
  when:
    - inventory_hostname in groups['masters'][1:]
    - hostvars[groups['masters'][0]]['kube_control_plane_join_command'] is defined
  tags: install

# Configure .kube pour l'utilisateur 1000:1000 sur les masters
- name: Configure .kube for user 1000:1000 on masters
  block:
    - name: Create .kube directory for user 1000
      file:
        path: "/home/{{ ansible_user }}/.kube"
        state: directory
        mode: '0755'
        owner: 1000
        group: 1000
      when: inventory_hostname in groups['masters']

    - name: Copy admin.conf to user 1000's .kube directory
      copy:
        src: /etc/kubernetes/admin.conf
        dest: "/home/{{ ansible_user }}/.kube/config"
        remote_src: yes
        owner: 1000
        group: 1000
        mode: '0644'
      when: inventory_hostname in groups['masters']

    - name: Set correct ownership for .kube/config
      file:
        path: "/home/{{ ansible_user }}/.kube/config"
        owner: 1000
        group: 1000
        mode: '0644'
      when: inventory_hostname in groups['masters']
  tags: install

# Joint les nœuds de travailleurs au cluster
- name: Join worker nodes to cluster
  command: "{{ hostvars[groups['masters'][0]]['kube_worker_join_command'] }}"
  register: join_result
  when:
    - inventory_hostname in groups['workers']
    - hostvars[groups['masters'][0]]['kube_worker_join_command'] is defined
  tags: install

# Joint les nœuds de données au cluster
- name: Join data nodes to cluster
  command: "{{ hostvars[groups['masters'][0]]['kube_data_join_command'] }}"
  register: join_result
  when:
    - inventory_hostname in groups['datas']
    - hostvars[groups['masters'][0]]['kube_data_join_command'] is defined
  tags: install


# Joint les nœuds de travailleurs au cluster
- name: Join network nodes to cluster
  command: "{{ hostvars[groups['masters'][0]]['kube_network_join_command'] }}"
  register: join_result
  when:
    - inventory_hostname in groups['networks']
    - hostvars[groups['masters'][0]]['kube_network_join_command'] is defined
  tags: install