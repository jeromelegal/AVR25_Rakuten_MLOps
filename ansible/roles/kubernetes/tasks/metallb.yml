---
- name: Install MetalLB using Helm
  command: helm install metallb metallb/metallb --namespace metallb-system --create-namespace --version 0.13.10 --set controller.tag=v0.13.10 --set speaker.tag=v0.13.10
  when: inventory_hostname == 'master1'
  become: yes
  tags: metallb

- name: Apply MetalLB configuration
  command: kubectl apply -f - <<EOF
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: first-pool
  namespace: metallb-system
spec:
  addresses:
  - 192.168.100.100-192.168.100.200
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: example
  namespace: metallb-system
EOF
  when: inventory_hostname == 'master1'
  become: yes
  tags: metallb
