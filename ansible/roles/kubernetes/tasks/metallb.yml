- name: Apply MetalLB manifests from rendered YAML
  command: kubectl apply -f /etc/helm/rendered/rendered-metallb/metallb-rendered.yaml
  run_once: true
  delegate_to: "{{ groups['masters'][0] }}"
  become: yes
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  tags: metallb

- name: Wait for metallb-controller rollout
  command: kubectl -n metallb-system rollout status deploy/metallb-controller --timeout=300s
  register: metallb_ctrl_rollout
  changed_when: false
  run_once: true
  delegate_to: "{{ groups['masters'][0] }}"
  become: yes
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  tags: metallb

- name: Wait for metallb-speaker rollout
  command: kubectl -n metallb-system rollout status ds/metallb-speaker --timeout=300s
  register: metallb_speaker_rollout
  changed_when: false
  run_once: true
  delegate_to: "{{ groups['masters'][0] }}"
  become: yes
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  tags: metallb

# Configuration MetalLB
- name: Apply MetalLB configuration
  command: kubectl apply -f -
  args:
    stdin: |
      apiVersion: metallb.io/v1beta1
      kind: IPAddressPool
      metadata:
        name: master-pool
        namespace: metallb-system
      spec:
        addresses:
        - {{ metallb_ip_range | default('192.168.200.100-192.168.200.200') }}
      ---
      apiVersion: metallb.io/v1beta1
      kind: L2Advertisement
      metadata:
        name: master-advertisement
        namespace: metallb-system
      spec:
        ipAddressPools:
        - master-pool
  run_once: true
  delegate_to: "{{ groups['masters'][0] }}"
  become: yes
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  tags: metallb

# Configuration complète pour les masters
- name: Configure kube-apiserver endpoints and services
  block:
    # Service externe principal pour l'API
    - name: Apply external LoadBalancer service for API
      command: kubectl apply -f -
      args:
        stdin: |
          apiVersion: v1
          kind: Service
          metadata:
            name: kubeapi-lb
            namespace: default
            annotations:
              metallb.universe.tf/loadBalancerIPs: "{{ metallb_master_ip | default('192.168.200.101') }}"
          spec:
            type: LoadBalancer
            ports:
            - port: 6443
              targetPort: 6443
              protocol: TCP
              name: https
            externalTrafficPolicy: Local
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      tags: metallb

    # Endpoints pour le service principal
    - name: Apply endpoints for main service
      command: kubectl apply -f -
      args:
        stdin: |
          apiVersion: v1
          kind: Endpoints
          metadata:
            name: kubeapi-lb
            namespace: default
          subsets:
          {% for master in groups['masters'] %}
          - addresses:
            - ip: "{{ hostvars[master].ansible_host | default(hostvars[master].ansible_default_ipv4.address) }}"
            ports:
            - port: 6443
              protocol: TCP
          {% endfor %}
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      tags: metallb

    # Service LoadBalancer supplémentaire pour les endpoints du control plane
    - name: Apply additional LoadBalancer for control plane endpoints
      command: kubectl apply -f -
      args:
        stdin: |
          apiVersion: v1
          kind: Service
          metadata:
            name: control-plane-lb
            namespace: kube-system
            annotations:
              metallb.universe.tf/loadBalancerIPs: "{{ metallb_control_plane_ip | default('192.168.200.102') }}"
          spec:
            type: LoadBalancer
            ports:
            - port: 6443
              targetPort: 6443
              protocol: TCP
              name: https
            externalTrafficPolicy: Local
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      tags: metallb

    # Endpoints pour le service supplémentaire
    - name: Apply endpoints for control plane service
      command: kubectl apply -f -
      args:
        stdin: |
          apiVersion: v1
          kind: Endpoints
          metadata:
            name: control-plane-lb
            namespace: kube-system
          subsets:
          {% for master in groups['masters'] %}
          - addresses:
            - ip: "{{ hostvars[master].ansible_host | default(hostvars[master].ansible_default_ipv4.address) }}"
            ports:
            - port: 6443
              protocol: TCP
          {% endfor %}
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      tags: metallb

# Déclaration du service Hubble UI LoadBalancer
- name: Apply LoadBalancer Service (MetalLB)
  vars:
    service_name: "hubble-ui"
    service_namespace: "kube-system"
    service_labels:
      k8s-app: hubble-ui
    metallb_address_pool: "master-pool"
    load_balancer_ip: ""
    source_ranges: []
    selector_labels:
      k8s-app: hubble-ui
    port: 80
    target_port: 8081
  command: kubectl apply -f -
  args:
    stdin: |
      {{ lookup('template', 'templates/metallb-serviceLB.j2') }}
  run_once: true
  delegate_to: "{{ groups['masters'][0] }}"
  become: yes
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  tags: metallb

# Vérifications
- name: Wait for services IP assignment
  block:
    - name: Wait for kubeapi-lb IP
      command: kubectl get svc kubeapi-lb -n default -o jsonpath='{.status.loadBalancer.ingress[0].ip}'
      register: kubeapi_lb_ip
      until: kubeapi_lb_ip.stdout != ""
      retries: 10
      delay: 10
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      tags: metallb

    - name: Wait for control-plane-lb IP
      command: kubectl get svc control-plane-lb -n kube-system -o jsonpath='{.status.loadBalancer.ingress[0].ip}'
      register: control_plane_lb_ip
      until: control_plane_lb_ip.stdout != ""
      retries: 10
      delay: 10
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      tags: metallb

- name: Verify MetalLB installation
  command: kubectl -n metallb-system get all
  run_once: true
  delegate_to: "{{ groups['masters'][0] }}"
  become: yes
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  tags: metallb

- name: Verify all services and endpoints
  command: kubectl get svc,endpoints -A
  register: all_services
  run_once: true
  delegate_to: "{{ groups['masters'][0] }}"
  become: yes
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  tags: metallb

- name: Show relevant services and endpoints
  debug:
    msg: "{{ all_services.stdout_lines | select('match', 'kubeapi-lb|control-plane-lb') | list }}"
  run_once: true
  delegate_to: "{{ groups['masters'][0] }}"
  tags: metallb
