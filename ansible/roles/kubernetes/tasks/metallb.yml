---
# roles/kubernetes/tasks/metallb.yml
- name: MetalLB — Déploiement complet
  vars:
    metallb_namespace: "metallb-system"
    metallb_version: "0.13.12"
    render_dir: "/etc/helm/rendered/metallb"
    download_dir: "{{ playbook_dir }}/templates/metallb-rendered"
    upload_dir: "{{ playbook_dir }}/rendered_local/metallb"
    remote_render_dir: "/etc/helm/rendered/metallb"
  block:
    # 1. Créer les répertoires
    - name: Créer les répertoires
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ render_dir }}"
        - "{{ download_dir }}"
        - "{{ upload_dir }}"
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      when: item.startswith('/etc/')

    - name: Créer les répertoires locaux
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ download_dir }}"
        - "{{ upload_dir }}"
      run_once: true
      delegate_to: localhost
      become: no

    # 2. Configurer le dépôt Helm
    - name: Configurer le dépôt MetalLB
      shell: |
        set -euo pipefail
        helm repo add metallb https://metallb.github.io/metallb || true
        helm repo update
      args:
        executable: /bin/bash
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes

    # 3. Générer le manifest complet
    - name: Générer le manifest MetalLB
      shell: |
        set -euo pipefail
        helm template metallb metallb/metallb \
          --version {{ metallb_version }} \
          --namespace {{ metallb_namespace }} \
          --include-crds \
          > "{{ render_dir }}/metallb-combined.yaml"
      args:
        executable: /bin/bash
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes

    # 4. Extraire les CRDs
    - name: Extraire les CRDs avec yq
      shell: |
        set -euo pipefail
        yq 'select(.kind == "CustomResourceDefinition")' "{{ render_dir }}/metallb-combined.yaml" > "{{ render_dir }}/metallb-crds.yaml"
      args:
        executable: /bin/bash
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes

    # 5. Rapatrier les fichiers
    - name: Rapatrier les manifests
      fetch:
        src: "{{ render_dir }}/{{ item.src }}"
        dest: "{{ download_dir }}/{{ item.dest }}"
        flat: yes
      loop:
        - { src: "metallb-crds.yaml", dest: "metallb-crds.yaml" }
        - { src: "metallb-combined.yaml", dest: "metallb-combined.yaml" }
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes

    # 6. Uploader les fichiers
    - name: Uploader les manifests
      copy:
        src: "{{ download_dir }}/{{ item.src }}"
        dest: "{{ remote_render_dir }}/{{ item.dest }}"
        mode: "0644"
      loop:
        - { src: "metallb-crds.yaml", dest: "metallb-crds.yaml" }
        - { src: "metallb-combined.yaml", dest: "metallb-combined.yaml" }
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes

    # 7. Créer le namespace
    - name: Créer le namespace metallb-system
      command: kubectl create namespace {{ metallb_namespace }}
      register: ns_create
      failed_when: ns_create.rc != 0 and 'already exists' not in ns_create.stderr
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      environment: { KUBECONFIG: "/etc/kubernetes/admin.conf" }

    # 8. Appliquer les CRDs
    - name: Appliquer les CRDs MetalLB
      command: kubectl apply -f {{ remote_render_dir }}/metallb-crds.yaml
      run_once: true
      register: crd_apply
      until: crd_apply.rc == 0
      retries: 100
      delay: 5
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      environment: { KUBECONFIG: "/etc/kubernetes/admin.conf" }

    # 9. Appliquer le manifest principal
    - name: Appliquer le manifest MetalLB
      command: kubectl apply -f {{ remote_render_dir }}/metallb-combined.yaml
      run_once: true
      register: manifest_apply
      until: manifest_apply.rc == 0
      retries: 100
      delay: 5
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      environment: { KUBECONFIG: "/etc/kubernetes/admin.conf" }

    # 10. Vérifier l'installation
    - name: Vérifier les pods MetalLB
      command: kubectl -n {{ metallb_namespace }} get pods
      register: metallb_pods
      until: metallb_pods.stdout.find('Running') != -1
      retries: 100
      delay: 10
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      environment: { KUBECONFIG: "/etc/kubernetes/admin.conf" }
  tags: [metallb]
