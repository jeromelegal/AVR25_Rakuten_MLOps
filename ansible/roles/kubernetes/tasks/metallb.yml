# Déploiement MetalLB avec double LoadBalancer
- name: Ensure masters group exists and is not empty
  assert:
    that:
      - "'masters' in groups"
      - "groups['masters'] | length > 0"
    fail_msg: "Le groupe [masters] doit exister et contenir au moins un hôte"
  run_once: true
  delegate_to: "{{ groups['masters'][0] }}"
  tags: metallb

- name: Add MetalLB Helm repository
  command: helm repo add metallb https://metallb.github.io/metallb
  args:
    creates: /root/.cache/helm/repository/metallb-index.yaml
  run_once: true
  delegate_to: "{{ groups['masters'][0] }}"
  become: yes
  tags: metallb

- name: Update Helm repositories
  command: helm repo update
  run_once: true
  delegate_to: "{{ groups['masters'][0] }}"
  become: yes
  tags: metallb

- name: Create metallb-system namespace
  ansible.builtin.command: kubectl create namespace metallb-system
  register: namespace_creation
  changed_when: "'created' in namespace_creation.stdout"
  failed_when: namespace_creation.rc != 0 and 'AlreadyExists' not in namespace_creation.stderr
  run_once: true
  delegate_to: "{{ groups['masters'][0] }}"
  become: yes
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  tags: metallb

