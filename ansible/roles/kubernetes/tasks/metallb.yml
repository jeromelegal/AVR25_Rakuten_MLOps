---
- name: Add MetalLB Helm repository
  command: helm repo add metallb https://metallb.github.io/metallb
  when: inventory_hostname == 'master1'
  become: yes
  tags: metallb

- name: Update Helm repositories
  command: helm repo update
  when: inventory_hostname == 'master1'
  become: yes
  tags: metallb

- name: Install MetalLB using Helm
  command: helm install metallb metallb/metallb --namespace metallb-system --create-namespace --version 0.13.10
  when: inventory_hostname == 'master1'
  become: yes
  tags: metallb

- name: Create MetalLB configuration file
  copy:
    dest: /tmp/metallb-config.yaml
    content: |
      apiVersion: metallb.io/v1beta1
      kind: IPAddressPool
      metadata:
        name: master-pool
        namespace: metallb-system
      spec:
        addresses:
        - 192.168.200.100-192.168.200.200
      ---
      apiVersion: metallb.io/v1beta1
      kind: L2Advertisement
      metadata:
        name: master-advertisement
        namespace: metallb-system
      spec:
        ipAddressPools:
        - master-pool
  when: inventory_hostname == 'master1'
  become: yes
  tags: metallb

- name: Apply MetalLB configuration
  command: kubectl apply -f /tmp/metallb-config.yaml
  when: inventory_hostname == 'master1'
  become: yes
  tags: metallb

- name: Create LoadBalancer service for Kubernetes masters
  command: kubectl apply -f - <<EOF
apiVersion: v1
kind: Service
metadata:
  name: kubernetes-master
  namespace: default
spec:
  type: LoadBalancer
  ports:
  - port: 6443
    targetPort: 6443
    protocol: TCP
    name: https
  selector:
    component: kube-apiserver
EOF
  when: inventory_hostname == 'master1'
  become: yes
  tags: metallb
