---
# roles/kubernetes/tasks/mayastor_apply.yml
- name: Mayastor — Préparation et application
  vars:
    mayastor_namespace: openebs
    data_node_group: datas
    mayastor_disk_device_default: "/dev/nvme0n2"
    taint_data_nodes: true
    set_default_sc: true
    default_sc_name: mayastor-3
    upload_dir: "{{ playbook_dir }}/rendered_local/mayastor-rendered"
    remote_render_dir: "/etc/helm/rendered/mayastor"
  block:
    # 1. Prérequis sur les nœuds data
    - name: Vérifier le kernel >= 5.13
      shell: |
        cur=$(uname -r | cut -d- -f1)
        printf "5.13\n%s\n" "$cur" | sort -C -V
      register: kernelchk
      failed_when: kernelchk.rc != 0
      changed_when: false
      when: inventory_hostname in groups[data_node_group]
      tags: [mayastor, apply]

    - name: Installer nvme-cli
      package:
        name: nvme-cli
        state: present
      when: inventory_hostname in groups[data_node_group]
      tags: [mayastor, apply]

    - name: Charger le module nvme_tcp
      modprobe:
        name: nvme_tcp
        state: present
      when: inventory_hostname in groups[data_node_group]
      tags: [mayastor, apply]

    - name: Persister nvme_tcp au boot
      copy:
        dest: /etc/modules-load.d/nvme_tcp.conf
        content: "nvme_tcp\n"
        mode: "0644"
      when: inventory_hostname in groups[data_node_group]
      tags: [mayastor, apply]

    - name: Configurer HugePages
      sysctl:
        name: vm.nr_hugepages
        value: "2048"
        sysctl_set: true
        reload: true
      when: inventory_hostname in groups[data_node_group]
      tags: [mayastor, apply]

    - name: Labeliser les nœuds
      command: kubectl label node {{ inventory_hostname }} {{ item.key }}={{ item.value }} --overwrite
      environment: { KUBECONFIG: "/etc/kubernetes/admin.conf" }
      register: label_result
      changed_when: "'labeled' in label_result.stdout or 'configured' in label_result.stdout or 'labeled' in label_result.stderr or 'configured' in label_result.stderr"
      loop:
        - { key: "openebs.io/engine", value: "mayastor" }
        - { key: "openebs.io/csi-node", value: "mayastor" }
        - { key: "openebs.io/storage", value: "mayastor" }
      when: inventory_hostname in groups[data_node_group]
      delegate_to: "{{ groups['masters'][0] }}"
      tags: [mayastor, apply]

    - name: Tainter les nœuds
      command: kubectl taint nodes {{ inventory_hostname }} openebs.io/storage=mayastor:NoSchedule --overwrite
      environment: { KUBECONFIG: "/etc/kubernetes/admin.conf" }
      register: taint_out
      changed_when: "'tainted' in (taint_out.stdout + taint_out.stderr) or 'already has' in (taint_out.stdout + taint_out.stderr)"
      when:
        - taint_data_nodes
        - inventory_hostname in groups[data_node_group]
      delegate_to: "{{ groups['masters'][0] }}"
      tags: [mayastor, apply]

    # 2. Créer le namespace
    - name: Créer le namespace
      command: kubectl create namespace {{ mayastor_namespace }}
      register: ns_out
      failed_when: ns_out.rc not in [0,1]
      changed_when: "'created' in ns_out.stdout"
      environment: { KUBECONFIG: "/etc/kubernetes/admin.conf" }
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      tags: [mayastor, apply]

    # 3. Créer le répertoire distant
    - name: Créer le répertoire distant
      file:
        path: "{{ remote_render_dir }}"
        state: directory
        mode: "0755"
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      tags: [mayastor, apply]

    # 4. Uploader les manifests
    - name: Uploader les manifests
      copy:
        src: "{{ upload_dir }}/{{ item.src }}"
        dest: "{{ remote_render_dir }}/{{ item.dest }}"
        mode: "0644"
      loop:
        - { src: "openebs.yaml", dest: "openebs.yaml" }
        - { src: "mayastor-values.yaml", dest: "mayastor-values.yaml" }
        - { src: "storageclasses.yaml", dest: "storageclasses.yaml" }
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      tags: [mayastor, apply]

    - name: Uploader les DiskPools
      copy:
        src: "{{ upload_dir }}/diskpool-{{ item }}.yaml"
        dest: "{{ remote_render_dir }}/diskpool-{{ item }}.yaml"
        mode: "0644"
      loop: "{{ groups[data_node_group] | default([]) }}"
      when: groups[data_node_group] is defined and groups[data_node_group] | length > 0
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      tags: [mayastor, apply]

    # 5. Appliquer les manifests avec vérification
    - name: Vérifier le namespace dans le manifest
      shell: |
        grep -c "namespace: {{ mayastor_namespace }}" {{ remote_render_dir }}/openebs.yaml
      register: namespace_check
      failed_when: namespace_check.stdout | int < 10
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      tags: [mayastor, apply]

    - name: Appliquer le manifest OpenEBS
      command: kubectl apply -f {{ remote_render_dir }}/openebs.yaml
      register: helm_install
      changed_when: "'deployed' in helm_install.stdout or 'installed' in helm_install.stdout or 'upgraded' in helm_install.stdout"
      environment: { KUBECONFIG: "/etc/kubernetes/admin.conf" }
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      tags: [mayastor, apply]

    - name: Vérifier les pods dans le bon namespace
      shell: |
        kubectl get pods -n {{ mayastor_namespace }} | grep -v "Running" | grep -v "Completed"
      register: pod_check
      failed_when: pod_check.stdout_lines | length > 0
      retries: 5
      delay: 10
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      tags: [mayastor, apply]

    # 6. Appliquer les composants spécifiques
    - name: Attendre que le CRD DiskPool soit prêt
      shell: kubectl get crd diskpools.openebs.io
      register: crd
      retries: 30
      delay: 5
      until: crd.rc == 0
      changed_when: false
      environment: { KUBECONFIG: "/etc/kubernetes/admin.conf" }
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      tags: [mayastor, apply]

    - name: Appliquer les DiskPools
      command: kubectl apply -f {{ remote_render_dir }}/diskpool-{{ item }}.yaml
      loop: "{{ groups[data_node_group] | default([]) }}"
      when: groups[data_node_group] is defined and groups[data_node_group] | length > 0
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      environment: { KUBECONFIG: "/etc/kubernetes/admin.conf" }
      tags: [mayastor, apply]

    - name: Appliquer les StorageClasses
      command: kubectl apply -f {{ remote_render_dir }}/storageclasses.yaml
      register: sc_apply
      changed_when: "'created' in sc_apply.stdout or 'configured' in sc_apply.stdout"
      environment: { KUBECONFIG: "/etc/kubernetes/admin.conf" }
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      tags: [mayastor, apply]

    # 7. Configurer la StorageClass par défaut
    - name: Configurer la StorageClass par défaut
      block:
        - name: Retirer l'annotation par défaut des autres SCs
          shell: |
            set -e
            for sc in $(kubectl get sc -o jsonpath='{.items[*].metadata.name}'); do
              if [ "$sc" != "{{ default_sc_name }}" ]; then
                kubectl annotate sc "$sc" storageclass.kubernetes.io/is-default-class- || true
              fi
            done
          environment: { KUBECONFIG: "/etc/kubernetes/admin.conf" }
          when: set_default_sc
          run_once: true
          delegate_to: "{{ groups['masters'][0] }}"
          become: yes
          tags: [mayastor, apply]

        - name: Définir la StorageClass par défaut
          command: kubectl annotate sc {{ default_sc_name }} storageclass.kubernetes.io/is-default-class="true" --overwrite
          register: annotate_out
          changed_when: "'annotated' in (annotate_out.stdout | default('')) or 'annotated' in (annotate_out.stderr | default(''))"
          when: set_default_sc
          run_once: true
          delegate_to: "{{ groups['masters'][0] }}"
          become: yes
          tags: [mayastor, apply]
  tags: [mayastor, apply]
