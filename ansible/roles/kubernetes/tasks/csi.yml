---
# Déploiement Cilium robuste en 2 phases (garde kube-proxy puis bascule optionnelle)
# Variables utiles (à mettre dans group_vars ou extra_vars si tu veux)
# cilium_chart_version: "1.18.2"
# kubeadm_api_port: 6443
# kubeadm_api_host: "192.168.200.10"     # IP d’un master joignable par TOUS les nœuds au bootstrap (pas le VIP MetalLB tant qu’il n’existe pas)
# kubernetes_pod_subnet: "10.244.0.0/16"
# pin_cilium_to_network_nodes: true      # place operator/hubble sur `network`. Le DS cilium, lui, tourne partout.
# cilium_enable_kpr_free: false          # si true, fera la phase B (bascule kube-proxy-free) à la fin.
- name: Cilium deploy (2 phases, safe)
  run_once: true
  delegate_to: "{{ groups['masters'][0] }}"
  become: yes
  tags: cni
  block:
    - name: Assert masters group present
      assert:
        that:
          - groups['masters'] is defined
          - groups['masters'] | length > 0
        fail_msg: "Le groupe [masters] doit exister et contenir au moins 1 hôte."
    # ---------- Préflight API ----------
    - name: Pick API host (fallback = master1 ansible_host)
      set_fact:
        api_host_for_cilium: "{{ kubeadm_api_host | default(hostvars[groups['masters'][0]].ansible_host) }}"
        api_port_for_cilium: "{{ kubeadm_api_port | default(6443) }}"
    - name: Check API health from master1
      shell: "curl -sk https://{{ api_host_for_cilium }}:{{ api_port_for_cilium }}/healthz || true"
      register: api_health
      changed_when: false
    - name: Fail early if API is not reachable
      fail:
        msg: "API {{ api_host_for_cilium }}:{{ api_port_for_cilium }} injoignable (healthz). Corrige avant d’installer Cilium."
      when: api_health.stdout is not search("ok")
    # ---------- Helm repo + cleanup éventuels ----------
    - name: Add Cilium Helm repository (idempotent)
      command: helm repo add cilium https://helm.cilium.io/
      args:
        creates: /root/.cache/helm/repository/cilium-index.yaml
    - name: Update Helm repositories
      command: helm repo update
      changed_when: false
    - name: Clean up any stuck Helm release secrets for cilium (best effort)
      shell: |
        set -e
        kubectl -n kube-system get secrets -o name | grep -E '^secret/sh\.helm\.release\.v1\.cilium\.v' || exit 0
        kubectl -n kube-system delete $(kubectl -n kube-system get secrets -o name | grep -E '^secret/sh\.helm\.release\.v1\.cilium\.v')
      environment: { KUBECONFIG: /etc/kubernetes/admin.conf }
      changed_when: false
      failed_when: false
    # ---------- Vérifier et annuler toute opération Helm en cours ----------
    - name: Check for ongoing Helm operations
      command: helm list --pending
      register: helm_operations
      environment: { KUBECONFIG: /etc/kubernetes/admin.conf }
      changed_when: false
    - name: Cancel ongoing Helm operations if any
      command: helm rollback cilium 0 --wait --timeout 5m
      when: "'cilium' in helm_operations.stdout"
      environment: { KUBECONFIG: /etc/kubernetes/admin.conf }
      register: helm_rollback
      changed_when: "'rolled back' in helm_rollback.stdout"
      failed_when: false
    - name: Wait for Helm operations to be canceled
      pause:
        seconds: 10
      when: "'cilium' in helm_operations.stdout"
    # ---------- Values selectors pour nodeSelector des composants "non DS cilium" ----------
    - name: Render /etc/cilium/values-selectors.yaml
      copy:
        dest: /etc/cilium/values-selectors.yaml
        mode: "0644"
        content: |
          # IMPORTANT : le DaemonSet cilium (agent) NE DOIT PAS être restreint -> tourne sur tous les nœuds
          {% if pin_cilium_to_network_nodes | default(true) %}
          operator:
            nodeSelector:
              node-role.kubernetes.io/network: "true"
          hubble:
            relay:
              enabled: false
              nodeSelector:
                node-role.kubernetes.io/network: "true"
            ui:
              enabled: false
              nodeSelector:
                node-role.kubernetes.io/network: "true"
          {% else %}
          hubble:
            relay:
              enabled: false
            ui:
              enabled: false
          operator: {}
          {% endif %}
    # ---------- PHASE A : kube-proxy conservé ----------
    - name: Install/Upgrade Cilium (Phase A, kubeProxyReplacement=false)
      command: >-
        helm upgrade --install cilium cilium/cilium
        --namespace kube-system
        --version {{ cilium_chart_version | default('1.18.2') }}
        --wait --atomic --timeout 10m
        -f /etc/cilium/values-selectors.yaml
        --set-string kubeProxyReplacement=false
        --set-string k8sServiceHost={{ api_host_for_cilium }}
        --set k8sServicePort={{ api_port_for_cilium }}
        --set ipam.mode=cluster-pool
        --set ipam.operator.clusterPoolIPv4PodCIDRList={{ kubernetes_pod_subnet | default('10.244.0.0/16') }}
        --set ipam.operator.clusterPoolIPv4MaskSize=24
        --set hubble.metrics.enabled="{dns:query;ignoreAAAA,drop,tcp,flow,icmp,http}"
        --set prometheus.enabled=true
        --set operator.prometheus.enabled=true
        --set bpf.masquerade=true
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
    - name: Wait rollout cilium DS
      command: kubectl -n kube-system rollout status ds/cilium --timeout=5m
      environment: { KUBECONFIG: /etc/kubernetes/admin.conf }
    - name: Wait rollout cilium-operator
      command: kubectl -n kube-system rollout status deploy/cilium-operator --timeout=5m
      environment: { KUBECONFIG: /etc/kubernetes/admin.conf }
    # Vérifie que tous les nodes redeviennent Ready (Cilium agent partout + kube-proxy actif)
    - name: Wait for all nodes Ready
      shell: |
        set -e
        kubectl get nodes --no-headers | awk '{print $1}' | \
        xargs -I{} kubectl wait --for=condition=Ready node/{} --timeout=180s
      environment: { KUBECONFIG: /etc/kubernetes/admin.conf }
    # ---------- PHASE B (optionnelle) : kube-proxy-free ----------
    - name: Switch to kube-proxy-free (kubeProxyReplacement=true)
      when: cilium_enable_kpr_free | default(false)
      block:
        - name: Check for ongoing Helm operations before switching to kube-proxy-free
          command: helm list --pending
          register: helm_operations_before_switch
          environment: { KUBECONFIG: /etc/kubernetes/admin.conf }
          changed_when: false
        - name: Cancel ongoing Helm operations before switching to kube-proxy-free
          command: helm rollback cilium 0 --wait --timeout 5m
          when: "'cilium' in helm_operations_before_switch.stdout"
          environment: { KUBECONFIG: /etc/kubernetes/admin.conf }
          register: helm_rollback_before_switch
          changed_when: "'rolled back' in helm_rollback_before_switch.stdout"
          failed_when: false
        - name: Wait for Helm operations to be canceled before switching to kube-proxy-free
          pause:
            seconds: 10
          when: "'cilium' in helm_operations_before_switch.stdout"
        - name: Upgrade Cilium to kube-proxy-free
          command: >-
            helm upgrade cilium cilium/cilium
            -n kube-system
            --reuse-values
            --wait --atomic --timeout 10m
            --set-string kubeProxyReplacement=true
          environment:
            KUBECONFIG: /etc/kubernetes/admin.conf
        - name: Delete kube-proxy DaemonSet
          command: kubectl -n kube-system delete ds kube-proxy --ignore-not-found=true
          environment: { KUBECONFIG: /etc/kubernetes/admin.conf }
        - name: Wait rollout cilium after switch
          command: kubectl -n kube-system rollout status ds/cilium --timeout=5m
          environment: { KUBECONFIG: /etc/kubernetes/admin.conf }
        - name: Ensure nodes still Ready after switch
          shell: |
            set -e
            kubectl get nodes --no-headers | awk '{print $1}' | \
            xargs -I{} kubectl wait --for=condition=Ready node/{} --timeout=180s
          environment: { KUBECONFIG: /etc/kubernetes/admin.conf }
    # ---------- Déploiement de Hubble ----------
    - name: Render /etc/cilium/values-hubble.yaml
      copy:
        dest: /etc/cilium/values-hubble.yaml
        mode: "0644"
        content: |
          # Configuration pour Hubble
          {% if pin_cilium_to_network_nodes | default(true) %}
          hubble:
            relay:
              enabled: true
              nodeSelector:
                node-role.kubernetes.io/network: "true"
            ui:
              enabled: true
              nodeSelector:
                node-role.kubernetes.io/network: "true"
          {% else %}
          hubble:
            relay:
              enabled: true
            ui:
              enabled: true
          {% endif %}
    - name: Check for ongoing Helm operations before installing Hubble
      command: helm list --pending
      register: helm_operations_before_hubble
      environment: { KUBECONFIG: /etc/kubernetes/admin.conf }
      changed_when: false
    - name: Cancel ongoing Helm operations before installing Hubble
      command: helm rollback cilium 0 --wait --timeout 5m
      when: "'cilium' in helm_operations_before_hubble.stdout"
      environment: { KUBECONFIG: /etc/kubernetes/admin.conf }
      register: helm_rollback_before_hubble
      changed_when: "'rolled back' in helm_rollback_before_hubble.stdout"
      failed_when: false
    - name: Wait for Helm operations to be canceled before installing Hubble
      pause:
        seconds: 10
      when: "'cilium' in helm_operations_before_hubble.stdout"
    - name: Install/Upgrade Hubble
      command: >-
        helm upgrade --install cilium cilium/cilium
        --namespace kube-system
        --version {{ cilium_chart_version | default('1.18.2') }}
        --wait --atomic --timeout 10m
        -f /etc/cilium/values-hubble.yaml
        --set-string kubeProxyReplacement={{ cilium_enable_kpr_free | default(false) | bool | lower }}
        --set-string k8sServiceHost={{ api_host_for_cilium }}
        --set k8sServicePort={{ api_port_for_cilium }}
        --set ipam.mode=cluster-pool
        --set ipam.operator.clusterPoolIPv4PodCIDRList={{ kubernetes_pod_subnet | default('10.244.0.0/16') }}
        --set ipam.operator.clusterPoolIPv4MaskSize=24
        --set hubble.metrics.enabled="{dns:query;ignoreAAAA,drop,tcp,flow,icmp,http}"
        --set prometheus.enabled=true
        --set operator.prometheus.enabled=true
        --set bpf.masquerade=true
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
    - name: Wait rollout cilium DS after Hubble
      command: kubectl -n kube-system rollout status ds/cilium --timeout=5m
      environment: { KUBECONFIG: /etc/kubernetes/admin.conf }
    - name: Wait rollout cilium-operator after Hubble
      command: kubectl -n kube-system rollout status deploy/cilium-operator --timeout=5m
      environment: { KUBECONFIG: /etc/kubernetes/admin.conf }
    - name: Ensure nodes still Ready after Hubble
      shell: |
        set -e
        kubectl get nodes --no-headers | awk '{print $1}' | \
        xargs -I{} kubectl wait --for=condition=Ready node/{} --timeout=180s
      environment: { KUBECONFIG: /etc/kubernetes/admin.conf }
