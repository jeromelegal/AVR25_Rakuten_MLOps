---
- name: Install dependencies
  apt:
    name: "{{ item }}"
    state: present
    update_cache: yes
  loop:
    - apt-transport-https
    - ca-certificates
    - curl
    - software-properties-common
    - gnupg-agent

- name: Add Docker GPG key
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Add Docker repository
  apt_repository:
    repo: deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
    state: present

- name: Install Docker
  apt:
    name: "{{ item }}"
    state: present
    update_cache: yes
  loop:
    - docker-ce
    - docker-ce-cli
    - containerd.io

- name: Add Kubernetes GPG key
  apt_key:
    url: https://packages.cloud.google.com/apt/doc/apt-key.gpg
    state: present

- name: Add Kubernetes repository
  apt_repository:
    repo: deb http://apt.kubernetes.io/ kubernetes-xenial main
    state: present

- name: Install Kubernetes components
  apt:
    name: "{{ item }}"
    state: present
    update_cache: yes
  loop:
    - kubelet
    - kubeadm
    - kubectl

- name: Initialize Kubernetes cluster (only on first master)
  command: kubeadm init --pod-network-cidr=10.244.0.0/16
  when: inventory_hostname == 'master1'

- name: Set up kubectl for root user
  command: mkdir -p /root/.kube && cp -i /etc/kubernetes/admin.conf /root/.kube/config
  when: inventory_hostname == 'master1'

- name: Join other masters to the cluster
  command: kubeadm join --token <token> <master1-ip>:6443 --discovery-token-ca-cert-hash <hash>
  when: inventory_hostname != 'master1' and kubernetes_role == 'master'

- name: Join workers to the cluster
  command: kubeadm join --token <token> <master1-ip>:6443 --discovery-token-ca-cert-hash <hash>
  when: kubernetes_role == 'worker'
