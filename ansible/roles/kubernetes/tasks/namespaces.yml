- name: Get Kubernetes version (JSON)
  command: kubectl version --output=json
  register: kubernetes_version
  changed_when: false
  when: inventory_hostname == groups['masters'][0]
  delegate_to: "{{ groups['masters'][0] }}"
  run_once: true
  become: yes
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  tags: namespaces

- name: Extract server version (strip leading v)
  set_fact:
    k8s_server_version: "{{ (kubernetes_version.stdout | from_json).serverVersion.gitVersion | regex_replace('^v', '') }}"
  when: inventory_hostname == groups['masters'][0]
  delegate_to: "{{ groups['masters'][0] }}"
  run_once: true
  tags: namespaces

- name: Create default namespaces (K8s >= 1.18)
  shell: |
    kubectl get namespace {{ item }} >/dev/null 2>&1 || \
    (kubectl create namespace {{ item }} --dry-run=client -o yaml | kubectl apply -f -)
  loop:
    - development
    - production
    - testing
  when:
    - inventory_hostname == groups['masters'][0]
    - k8s_server_version is version('1.18', '>=')
  delegate_to: "{{ groups['masters'][0] }}"
  run_once: true
  become: yes
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  tags: namespaces

- name: Create default namespaces (K8s < 1.18)
  shell: |
    kubectl get namespace {{ item }} >/dev/null 2>&1 || \
    (kubectl create namespace {{ item }} --dry-run -o yaml | kubectl apply -f -)
  loop:
    - development
    - production
    - testing
  when:
    - inventory_hostname == groups['masters'][0]
    - k8s_server_version is version('1.18', '<')
  delegate_to: "{{ groups['masters'][0] }}"
  run_once: true
  become: yes
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  tags: namespaces
