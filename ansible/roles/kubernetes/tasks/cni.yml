---
# Installer Cilium avec nodeSelectors (operator + Hubble sur nœuds "network")



- name: Ensure Cilium values dir
  file:
    path: /etc/cilium
    state: directory
    mode: '0755'
  run_once: true
  delegate_to: "{{ groups['masters'][0] }}"
  become: yes
  tags: cni

# values.yaml pour router les composants sur les nœuds "network"
- name: Write cilium values file for nodeSelectors
  copy:
    dest: /etc/cilium/values-selectors.yaml
    owner: root
    group: root
    mode: '0644'
    content: |
      operator:
        nodeSelector:
          node-role.kubernetes.io/network: "true"
      hubble:
        enabled: true
        relay:
          enabled: true
          nodeSelector:
            node-role.kubernetes.io/network: "true"
        ui:
          enabled: true
          nodeSelector:
            node-role.kubernetes.io/network: "true"
      # Si vos nœuds "network" sont taintés (ex: dedicated=network:NoSchedule), décommentez :
      # operator:
      #   tolerations:
      #     - key: dedicated
      #       operator: Equal
      #       value: network
      #       effect: NoSchedule
      # hubble:
      #   relay:
      #     tolerations:
      #       - key: dedicated
      #         operator: Equal
      #         value: network
      #         effect: NoSchedule
      #   ui:
      #     tolerations:
      #       - key: dedicated
      #         operator: Equal
      #         value: network
      #         effect: NoSchedule
  run_once: true
  delegate_to: "{{ groups['masters'][0] }}"
  become: yes
  tags: cni

- name: Add Cilium Helm repository
  command: helm repo add cilium https://helm.cilium.io/
  args:
    creates: /root/.cache/helm/repository/cilium-index.yaml
  environment:
    HELM_CONFIG_HOME: /root/.config/helm
    HELM_CACHE_HOME: /root/.cache/helm
  run_once: true
  delegate_to: "{{ groups['masters'][0] }}"
  become: yes
  tags: cni

- name: Update Helm repositories
  command: helm repo update
  environment:
    HELM_CONFIG_HOME: /root/.config/helm
    HELM_CACHE_HOME: /root/.cache/helm
  run_once: true
  delegate_to: "{{ groups['masters'][0] }}"
  become: yes
  tags: cni

# 1) Déploiement en mode "progressive" pour stabiliser le réseau tant que kube-proxy existe
