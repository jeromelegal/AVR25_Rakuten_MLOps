#     HELM_CACHE_HOME: /root/.cache/helm
#   run_once: true
#   delegate_to: "{{ groups['masters'][0] }}"
#   become: yes
#   tags: cni
- name: Install/Upgrade Cilium (kube-proxy free phase)
  command: >-
    helm upgrade --install cilium cilium/cilium
    --namespace kube-system
    --version {{ cilium_chart_version | default('1.18.2') }}
    --wait --atomic --timeout 10m
    -f /etc/cilium/values-selectors.yaml
    --set-string kubeProxyReplacement=true
    --set-string k8sServiceHost={{ kubeadm_control_plane_endpoint }}
    --set k8sServicePort={{ kubeadm_api_port | default(6443) }}
    --set ipam.mode=cluster-pool
    --set ipam.operator.clusterPoolIPv4PodCIDRList={{ kubernetes_pod_subnet | default('10.244.0.0/16') }}
    --set ipam.operator.clusterPoolIPv4MaskSize=24
    --set hubble.metrics.enabled="{dns:query;ignoreAAAA,drop,tcp,flow,icmp,http}"
    --set prometheus.enabled=true
    --set operator.prometheus.enabled=true
    --set bpf.masquerade=true
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  run_once: true
  delegate_to: "{{ groups['masters'][0] }}"
  become: yes
  tags: cni



- name: Wait for cilium DaemonSet rollout
  command: kubectl -n kube-system rollout status ds/cilium --timeout=5m
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  run_once: true
  delegate_to: "{{ groups['masters'][0] }}"
  become: yes
  tags: cni

- name: Wait for cilium-operator Deployment rollout
  command: kubectl -n kube-system rollout status deployment/cilium-operator --timeout=5m
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  run_once: true
  delegate_to: "{{ groups['masters'][0] }}"
  become: yes
  tags: cni

# 2) Passer en kube-proxy-free (suppression kube-proxy)
- name: Remove kube-proxy DaemonSet (if switching to kube-proxy-free)
  command: kubectl -n kube-system delete ds kube-proxy --ignore-not-found=true
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  when: cilium_kube_proxy_free | default(true)
  run_once: true
  delegate_to: "{{ groups['masters'][0] }}"
  become: yes
  tags: cni

# 3) Bascule Cilium en kube-proxy-free et conserve toutes les valeurs précédentes (nodeSelectors)
- name: Upgrade Cilium to kube-proxy-free (reuse previous values)
  command: >-
    helm upgrade cilium cilium/cilium
    --namespace kube-system
    --version {{ cilium_chart_version | default('1.18.2') }}
    --wait --atomic --timeout 10m
    --reuse-values
    --set-string kubeProxyReplacement=true
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
    HELM_CONFIG_HOME: /root/.config/helm
    HELM_CACHE_HOME: /root/.cache/helm
  when: cilium_kube_proxy_free | default(true)
  run_once: true
  delegate_to: "{{ groups['masters'][0] }}"
  become: yes
  tags: cni

# 4) Re-vérifier les rollouts après la bascule
- name: Wait for cilium DaemonSet rollout (post-switch)
  command: kubectl -n kube-system rollout status ds/cilium --timeout=5m
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  when: cilium_kube_proxy_free | default(true)
  run_once: true
  delegate_to: "{{ groups['masters'][0] }}"
  become: yes
  tags: cni

- name: Wait for cilium-operator Deployment rollout (post-switch)
  command: kubectl -n kube-system rollout status deployment/cilium-operator --timeout=5m
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  when: cilium_kube_proxy_free | default(true)
  run_once: true
  delegate_to: "{{ groups['masters'][0] }}"
  become: yes
  tags: cni
