---
- name: Add Cilium Helm repository
  command: helm repo add cilium https://helm.cilium.io/
  when: inventory_hostname == 'master1'
  become: yes
  tags: cni

- name: Update Helm repositories
  command: helm repo update
  when: inventory_hostname == 'master1'
  become: yes
  tags: cni

- name: Install Cilium using Helm
  command: helm install cilium cilium/cilium --version 1.14.1 --namespace kube-system --set kubeProxyReplacement=strict --set k8sServiceHost=kubernetes-master --set k8sServicePort=6443
  when: inventory_hostname == 'master1'
  become: yes
  tags: cni

- name: Verify Cilium installation
  command: kubectl -n kube-system rollout status deployment/cilium-operator
  when: inventory_hostname == 'master1'
  become: yes
  tags: cni
