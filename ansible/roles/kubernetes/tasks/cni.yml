---
# Installer Cilium (kube-proxy free) – exécution unique depuis master1
- name: Ensure masters group exists and is not empty
  assert:
    that:
      - "'masters' in groups"
      - "groups['masters'] | length > 0"
    fail_msg: "Le groupe [masters] doit exister et contenir au moins un hôte"
  run_once: true
  delegate_to: "{{ groups['masters'][0] }}"
  tags: cni

- name: Add Cilium Helm repository
  command: helm repo add cilium https://helm.cilium.io/
  args:
    creates: /root/.cache/helm/repository/cilium-index.yaml
  environment:
    HELM_CONFIG_HOME: /root/.config/helm
    HELM_CACHE_HOME: /root/.cache/helm
  run_once: true
  delegate_to: "{{ groups['masters'][0] }}"
  become: yes
  tags: cni

- name: Update Helm repositories
  command: helm repo update
  environment:
    HELM_CONFIG_HOME: /root/.config/helm
    HELM_CACHE_HOME: /root/.cache/helm
  run_once: true
  delegate_to: "{{ groups['masters'][0] }}"
  become: yes
  tags: cni




- name: Install/Upgrade Cilium (kube-proxy replacement = true)
  command: >-
    helm upgrade --install cilium cilium/cilium
    --namespace kube-system
    --version {{ cilium_chart_version | default('1.18.2') }}
    --set-string kubeProxyReplacement=true
    --set-string k8sServiceHost={{ kubeadm_control_plane_endpoint }}
    --set k8sServicePort={{ kubeadm_api_port | default(6443) }}
    --set ipam.mode=cluster-pool
    --set ipam.operator.clusterPoolIPv4PodCIDRList="{{ kubernetes_pod_subnet | default('10.244.0.0/16') }}"
    --set ipam.operator.clusterPoolIPv4MaskSize=24
    --set hubble.enabled=true
    --set hubble.relay.enabled=true
    --set hubble.ui.enabled=true
    --set hubble.metrics.enabled="{dns:query;ignoreAAAA,drop,tcp,flow,icmp,http}"
    --set prometheus.enabled=true
    --set operator.prometheus.enabled=true
    --set nativeRoutingCIDR={{ kubernetes_pod_subnet | default('10.244.0.0/16') }}
    --set bpf.masquerade=true
    --set securityContext.capabilities.add=CILIUM_ALL
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
    HELM_CONFIG_HOME: /root/.config/helm
    HELM_CACHE_HOME: /root/.cache/helm
  run_once: true
  delegate_to: "{{ groups['masters'][0] }}"
  become: yes
  tags: cni





- name: Wait for cilium DaemonSet rollout
  command: kubectl -n kube-system rollout status ds/cilium --timeout=5m
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  run_once: true
  delegate_to: "{{ groups['masters'][0] }}"
  become: yes
  tags: cni

- name: Wait for cilium-operator Deployment rollout
  command: kubectl -n kube-system rollout status deployment/cilium-operator --timeout=5m
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  run_once: true
  delegate_to: "{{ groups['masters'][0] }}"
  become: yes
  tags: cni

- name: Remove kube-proxy DaemonSet (kube-proxy free)
  command: kubectl -n kube-system delete ds kube-proxy --ignore-not-found=true
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  run_once: true
  delegate_to: "{{ groups['masters'][0] }}"
  become: yes
  tags: cni

# Vérification Cilium (status depuis un Pod Cilium)
- name: Verify Cilium status (first cilium pod)
  shell: |
    POD=$(kubectl -n kube-system get pods -l k8s-app=cilium -o jsonpath='{.items[0].metadata.name}')
    kubectl -n kube-system exec -t "$POD" -- cilium status
  args:
    executable: /bin/bash
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  run_once: true
  delegate_to: "{{ groups['masters'][0] }}"
  become: yes
  tags: cni

- name: Verify connectivity test
  command: kubectl -n kube-system exec -t cilium-$(kubectl -n kube-system get pods -l k8s-app=cilium -o jsonpath='{.items[0].metadata.name}') -- cilium connectivity test
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  run_once: true
  delegate_to: "{{ groups['masters'][0] }}"
  become: yes
  tags: cni
