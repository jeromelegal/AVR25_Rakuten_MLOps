---
# roles/helm/tasks/cilium_upload_and_apply.yml
- name: Cilium — Upload et application
  vars:
    kube_system_ns: "kube-system"
    upload_dir: "{{ playbook_dir }}/rendered_local/cilium-rendered"
    remote_render_dir: "/etc/helm/rendered/cilium"
  block:
    # 1. Créer le répertoire distant
    - name: Créer le répertoire distant
      file:
        path: "{{ remote_render_dir }}"
        state: directory
        mode: "0755"
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes

    # 2. Upload des fichiers
    - name: Uploader les manifests Cilium
      copy:
        src: "{{ upload_dir }}/{{ item }}"
        dest: "{{ remote_render_dir }}/{{ item }}"
        mode: "0644"
      loop:
        - "cilium-phase1.yaml"
        - "cilium-phase2-kpr.yaml"
        - "cilium-phase3-hubble.yaml"
      when: item in lookup('fileglob', upload_dir + '/*', wantlist=True)
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes

    # 3. Appliquer les manifests (phase par phase)
    - name: Appliquer le manifest Cilium (phase 1)
      command: kubectl apply -f {{ remote_render_dir }}/cilium-phase1.yaml
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      environment: { KUBECONFIG: "/etc/kubernetes/admin.conf" }

    - name: Attendre que Cilium soit prêt
      command: kubectl -n {{ kube_system_ns }} rollout status deployment/cilium-operator
      register: cilium_ready
      until: cilium_ready.rc == 0
      retries: 100
      delay: 5
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      environment: { KUBECONFIG: "/etc/kubernetes/admin.conf" }

    - name: Appliquer le manifest Cilium (phase 2)
      command: kubectl apply -f {{ remote_render_dir }}/cilium-phase2-kpr.yaml
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      environment: { KUBECONFIG: "/etc/kubernetes/admin.conf" }

    - name: Appliquer le manifest Cilium (phase 3)
      command: kubectl apply -f {{ remote_render_dir }}/cilium-phase3-hubble.yaml
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      environment: { KUBECONFIG: "/etc/kubernetes/admin.conf" }

    # 4. Vérifier l'installation
    - name: Vérifier les pods Cilium
      command: kubectl -n {{ kube_system_ns }} get pods -l k8s-app=cilium
      register: cilium_pods
      until: cilium_pods.stdout.find('Running') != -1
      retries: 100
      delay: 5
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      environment: { KUBECONFIG: "/etc/kubernetes/admin.conf" }
  tags: [cilium, upload, apply]
