---
# roles/helm/tasks/cilium_three_phases.yml
- name: Cilium — réseau d’abord, puis KPR, puis Hubble (autonome)
  vars:
    kube_system_ns: "kube-system"
    cilium_version: "1.18.2"
    kubeconfig_path: "/etc/kubernetes/admin.conf"

    render_dir: "/etc/helm/rendered/cilium"
    manifest_phase1: "{{ render_dir }}/cilium-phase1.yaml"
    manifest_phase2: "{{ render_dir }}/cilium-phase2-kpr.yaml"
    manifest_phase3: "{{ render_dir }}/cilium-phase3-hubble.yaml"

    enable_kpr: true
    remove_kube_proxy: true
    enable_hubble: true
    enable_hubble_ui: true

    # Une ou plusieurs plages podCIDR (list → Helm: {cidr1,cidr2})
    pod_cidr_list: ["10.244.0.0/16"]
  block:

    ###########################################################################
    # 0) DÉCOUVERTE API + ATTENTE
    ###########################################################################
    - name: Découvrir host:port API depuis Endpoints default/kubernetes
      command: >
        kubectl -n default get endpoints kubernetes
        -o jsonpath='{.subsets[0].addresses[0].ip}:{.subsets[0].ports[0].port}'
      register: api_hostport
      changed_when: false
      failed_when: api_hostport.rc != 0 or api_hostport.stdout == ""
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      environment: { KUBECONFIG: "{{ kubeconfig_path }}" }

    - name: Découper proprement host:port
      set_fact:
        _api_parts: "{{ api_hostport.stdout.split(':') }}"
      run_once: true

    - name: Définir les facts k8sServiceHost/Port (nécessaires pour KPR/Hubble)
      set_fact:
        cilium_api_host: "{{ _api_parts[0] }}"
        cilium_api_port: "{{ _api_parts[1] if (_api_parts | length) > 1 else '6443' }}"
      run_once: true

    - name: Attendre l’API Kubernetes
      command: kubectl --request-timeout=5s get --raw='/version'
      register: api_ping
      retries: 60
      delay: 5
      until: api_ping.rc == 0
      changed_when: false
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      environment: { KUBECONFIG: "{{ kubeconfig_path }}" }

    ###########################################################################
    # 1) PHASE RÉSEAU : appliquer le manifest rendu (phase 1)
    ###########################################################################
    - name: Vérifier la présence du manifest phase 1
      stat:
        path: "{{ manifest_phase1 }}"
      register: phase1_stat
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes

    - name: (Sécurité) Rendre phase 1 si manquant
      when: not phase1_stat.stat.exists
      shell: |
        set -euo pipefail
        mkdir -p "{{ render_dir }}"
        helm repo add cilium https://helm.cilium.io || true
        helm repo update
        helm template cilium cilium/cilium \
          --version {{ cilium_version }} \
          --namespace {{ kube_system_ns }} \
          --set-string kubeProxyReplacement=false \
          --set ipam.mode=cluster-pool \
          --set ipam.operator.clusterPoolIPv4PodCIDRList={{ '{' ~ (pod_cidr_list | join(',')) ~ '}' }} \
          --set ipam.operator.clusterPoolIPv4MaskSize=24 \
          > "{{ manifest_phase1 }}"
      args: { executable: /bin/bash }
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes

    - name: Appliquer la phase 1 (réseau avec kube-proxy)
      command: kubectl apply -f "{{ manifest_phase1 }}"
      register: apply_phase1
      changed_when: "'created' in (apply_phase1.stdout | default('')) or 'configured' in (apply_phase1.stdout | default(''))"
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      environment: { KUBECONFIG: "{{ kubeconfig_path }}" }

    - name: Attendre readiness cilium-agent (phase 1)
      command: kubectl -n {{ kube_system_ns }} rollout status ds/cilium --timeout=600s
      changed_when: false
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      environment: { KUBECONFIG: "{{ kubeconfig_path }}" }

    - name: Attendre readiness cilium-operator (phase 1)
      command: kubectl -n {{ kube_system_ns }} rollout status deploy/cilium-operator --timeout=600s
      changed_when: false
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      environment: { KUBECONFIG: "{{ kubeconfig_path }}" }

    ###########################################################################
    # 2) PHASE KPR : rendre + appliquer, puis (optionnel) suppression kube-proxy
    ###########################################################################
    - name: Rendre la phase 2 (KPR)
      when: enable_kpr | bool
      shell: |
        set -euo pipefail
        mkdir -p "{{ render_dir }}"
        helm repo add cilium https://helm.cilium.io || true
        helm repo update
        helm template cilium cilium/cilium \
          --version {{ cilium_version }} \
          --namespace {{ kube_system_ns }} \
          --set-string kubeProxyReplacement=true \
          --set-string k8sServiceHost={{ cilium_api_host }} \
          --set k8sServicePort={{ cilium_api_port }} \
          --set bpf.masquerade=true \
          --set ipam.mode=cluster-pool \
          --set ipam.operator.clusterPoolIPv4PodCIDRList={{ '{' ~ (pod_cidr_list | join(',')) ~ '}' }} \
          --set ipam.operator.clusterPoolIPv4MaskSize=24 \
          > "{{ manifest_phase2 }}"
      args: { executable: /bin/bash }
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes

    - name: Appliquer la phase 2 (KPR)
      when: enable_kpr | bool
      command: kubectl apply -f "{{ manifest_phase2 }}"
      register: apply_phase2
      changed_when: "'created' in (apply_phase2.stdout | default('')) or 'configured' in (apply_phase2.stdout | default(''))"
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      environment: { KUBECONFIG: "{{ kubeconfig_path }}" }

    - name: Attendre readiness cilium-agent (KPR)
      when: enable_kpr | bool
      command: kubectl -n {{ kube_system_ns }} rollout status ds/cilium --timeout=600s
      changed_when: false
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      environment: { KUBECONFIG: "{{ kubeconfig_path }}" }

    - name: Attendre readiness cilium-operator (KPR)
      when: enable_kpr | bool
      command: kubectl -n {{ kube_system_ns }} rollout status deploy/cilium-operator --timeout=600s
      changed_when: false
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      environment: { KUBECONFIG: "{{ kubeconfig_path }}" }

    - name: Supprimer kube-proxy DaemonSet (optionnel)
      when: enable_kpr | bool and remove_kube_proxy | bool
      command: kubectl -n kube-system delete ds kube-proxy --ignore-not-found=true
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      environment: { KUBECONFIG: "{{ kubeconfig_path }}" }

    - name: Supprimer kube-proxy ConfigMap (éviter réinstall kubeadm)
      when: enable_kpr | bool and remove_kube_proxy | bool
      command: kubectl -n kube-system delete cm kube-proxy --ignore-not-found=true
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      environment: { KUBECONFIG: "{{ kubeconfig_path }}" }

    - name: (Optionnel) Nettoyage iptables post kube-proxy
      when: enable_kpr | bool and remove_kube_proxy | bool
      shell: |
        set -euo pipefail
        iptables-save | grep -v KUBE | iptables-restore
      args: { executable: /bin/bash }
      become: yes

    ###########################################################################
    # 3) PHASE HUBBLE : rendre + appliquer, puis attentes
    ###########################################################################
    - name: Rendre la phase 3 (Hubble)
      when: enable_hubble | bool
      shell: |
        set -euo pipefail
        mkdir -p "{{ render_dir }}"
        helm repo add cilium https://helm.cilium.io || true
        helm repo update
        helm template cilium cilium/cilium \
          --version {{ cilium_version }} \
          --namespace {{ kube_system_ns }} \
          --set-string kubeProxyReplacement=true \
          --set-string k8sServiceHost={{ cilium_api_host }} \
          --set k8sServicePort={{ cilium_api_port }} \
          --set hubble.enabled=true \
          --set hubble.relay.enabled=true \
          {{ enable_hubble_ui | bool | ternary('--set hubble.ui.enabled=true','') }} \
          --set ipam.mode=cluster-pool \
          --set ipam.operator.clusterPoolIPv4PodCIDRList={{ '{' ~ (pod_cidr_list | join(',')) ~ '}' }} \
          --set ipam.operator.clusterPoolIPv4MaskSize=24 \
          > "{{ manifest_phase3 }}"
      args: { executable: /bin/bash }
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes

    - name: Appliquer la phase 3 (Hubble)
      when: enable_hubble | bool
      command: kubectl apply -f "{{ manifest_phase3 }}"
      register: apply_phase3
      changed_when: "'created' in (apply_phase3.stdout | default('')) or 'configured' in (apply_phase3.stdout | default(''))"
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      environment: { KUBECONFIG: "{{ kubeconfig_path }}" }

    - name: Attendre readiness hubble-relay
      when: enable_hubble | bool
      command: kubectl -n {{ kube_system_ns }} rollout status deploy/hubble-relay --timeout=600s
      changed_when: false
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      environment: { KUBECONFIG: "{{ kubeconfig_path }}" }

    - name: Attendre readiness hubble-ui (si activé)
      when: enable_hubble | bool and enable_hubble_ui | bool
      command: kubectl -n {{ kube_system_ns }} rollout status deploy/hubble-ui --timeout=600s
      changed_when: false
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      become: yes
      environment: { KUBECONFIG: "{{ kubeconfig_path }}" }
  tags: cilium