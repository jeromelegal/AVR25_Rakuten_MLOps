# Applique les taints aux nœuds data (optionnel, selon vos besoins)
- name: Taint data nodes
  command: kubectl taint nodes {{ item }} node-role.kubernetes.io/data=true:NoSchedule --overwrite
  loop: "{{ groups['datas'] | default([]) }}"
  delegate_to: "{{ groups['masters'][0] }}"
  run_once: true
  become: yes
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  when: item in k8s_nodes.stdout.split()
  tags: taint_nodes
