apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: kube-system
  name: bootstrap-cert-access
rules:
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["kubeadm-certs"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bootstrap-cert-access
  namespace: kube-system
subjects:
- kind: Group
  name: system:bootstrappers
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: bootstrap-cert-access
  apiGroup: rbac.authorization.k8s.io
