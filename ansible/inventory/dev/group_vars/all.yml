---
# Configuration générale
ansible_user: ubuntu
ansible_ssh_private_key_file: ~/.ssh/id_rsa

# Configuration Kubernetes
kubeadm_control_plane_endpoint: "kubernetes-master"
kubeadm_advertise_address: "192.168.200.10"
kubeadm_version: "1.34.0"
kubeadm_pod_subnet: "10.244.0.0/16"
kubernetes_service_subnet: "10.96.0.0/12"
cluster_name: "kubernetes"

# Configuration réseau
metallb_address_pool: "192.168.200.200-192.168.200.250"
dns_domain: "cluster.local"

# Configuration containerd
containerd_version: "1.6.28"
containerd_sandbox_image: "registry.k8s.io/pause:3.10.1"

# Configuration système
swap_enabled: false
systemd_cgroup: true

# Configuration CRI
cri_socket: "unix:///var/run/containerd/containerd.sock"
