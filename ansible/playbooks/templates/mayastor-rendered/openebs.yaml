# Source: openebs/charts/mayastor/templates/mayastor/csi/csi-node-daemonset.yaml
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: openebs-csi-node
  labels:
    app: csi-node
    openebs.io/release: openebs
    openebs.io/version: 2.9.2
    openebs.io/csi-node: mayastor
spec:
  selector:
    matchLabels:
      app: csi-node
      openebs.io/release: openebs
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  minReadySeconds: 10
  template:
    metadata:
      labels:
        app: csi-node
        openebs.io/release: openebs
        openebs.io/version: 2.9.2
        openebs.io/logging: "true"
    spec:
      serviceAccountName: openebs-service-account
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      imagePullSecrets:
      priorityClassName: openebs-cluster-critical
      nodeSelector:
        kubernetes.io/arch: amd64
        openebs.io/csi-node: mayastor
      tolerations: 
        - effect: NoSchedule
          key: openebs.io/storage
          operator: Equal
          value: mayastor
      initContainers:
        - command:
          - sh
          - -c
          - trap "exit 1" TERM; until [ -d /sys/module/nvme_tcp ]; do [ -z "$WARNED" ] &&
            echo "nvme_tcp module not loaded..."; WARNED=1; sleep 60; done;
          image: docker.io/openebs/alpine-sh:4.2.0
          imagePullPolicy: IfNotPresent
          name: nvme-tcp-probe
      # NOTE: Each container must have mem/cpu limits defined in order to
      # belong to Guaranteed QoS class, hence can never get evicted in case of
      # pressure unless they exceed those limits. limits and requests must be
      # the same.
      containers:
      - name: csi-node
        image: "docker.io/openebs/mayastor-csi-node:v2.9.2"
        imagePullPolicy: IfNotPresent
        # we need privileged because we mount filesystems and use mknod
        securityContext:
          privileged: true
        env:
        - name: RUST_LOG
          value: info
        - name: MY_NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: MY_POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: RUST_BACKTRACE
          value: "1"
        args:
        - "--csi-socket=/csi/csi.sock"
        - "--node-name=$(MY_NODE_NAME)"
        - "--rest-endpoint=http://openebs-api-rest:8081"
        - "--enable-rest"
        - "--enable-registration"
        - "--grpc-ip=$(MY_POD_IP)"
        - "--grpc-port=10199"
        - "--nvme-io-timeout=110s10s"
        - "--nvme-core-io-timeout=110s10s"
        - "--nvme-ctrl-loss-tmo=1980"
        - "--nvme-nr-io-queues=2"
        - "--nvme-connect-fallback=true"
        - "--kubelet-path=/var/lib/kubelet"
        - "--node-selector=openebs.io/csi-node=mayastor"
        - "--fmt-style=pretty"
        - "--ansi-colors=true"
        volumeMounts:
        - name: device
          mountPath: /dev
        - name: sys
          mountPath: /sys
        - name: run-udev
          mountPath: /run/udev
        - name: plugin-dir
          mountPath: /csi
        - name: kubelet-dir
          mountPath: /var/lib/kubelet
          mountPropagation: "Bidirectional"
        resources:
          limits:
            cpu: "100m"
            memory: "128Mi"
          requests:
            cpu: "100m"
            memory: "64Mi"
      - name: csi-driver-registrar
        image: "registry.k8s.io/sig-storage/csi-node-driver-registrar:v2.13.0"
        imagePullPolicy: IfNotPresent
        args:
        - "--csi-address=/csi/csi.sock"
        - "--kubelet-registration-path=/var/lib/kubelet/plugins/io.openebs.mayastor/csi.sock"
        volumeMounts:
        - name: plugin-dir
          mountPath: /csi
        - name: registration-dir
          mountPath: /registration
        resources:
          limits:
            cpu: "100m"
            memory: "50Mi"
          requests:
            cpu: "100m"
            memory: "50Mi"
        # Mayastor node plugin gRPC server
        ports:
        - containerPort: 10199
          protocol: TCP
