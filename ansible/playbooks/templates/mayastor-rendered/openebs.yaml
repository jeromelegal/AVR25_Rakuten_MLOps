      dnsPolicy: ClusterFirstWithHostNet
      initContainers:
        - command:
          - sh
          - -c
          - trap "exit 1" TERM; until nc -vzw 5 openebs-agent-core 50052; do date;
            echo "Waiting for agent-cluster-grpc services..."; sleep 1; done;
          image: docker.io/openebs/alpine-sh:4.2.0
          imagePullPolicy: IfNotPresent
          name: agent-cluster-grpc-probe
      imagePullSecrets:
      priorityClassName: openebs-cluster-critical
      nodeSelector:
        kubernetes.io/arch: amd64
        openebs.io/csi-node: mayastor
