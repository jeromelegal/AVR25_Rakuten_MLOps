apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: openebs-io-engine
  labels:
    app: io-engine
    openebs.io/release: openebs
    openebs.io/version: 2.7.0
spec:
  selector:
    matchLabels:
      app: io-engine
      openebs.io/release: openebs
  updateStrategy:
    type: OnDelete
  minReadySeconds: 10
  template:
    metadata:
      labels:
        app: io-engine
        openebs.io/release: openebs
        openebs.io/version: 2.7.0
        openebs.io/logging: "true"
    spec:
      imagePullSecrets:
      hostNetwork: true
      # To resolve services in the namespace
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kubernetes.io/arch: amd64
        openebs.io/engine: mayastor
      tolerations: 
        - effect: NoSchedule
          key: openebs.io/storage
          operator: Equal
          value: mayastor
      initContainers:
        - command:
          - sh
          - -c
          - trap "exit 1" TERM; until nc -vzw 5 openebs-agent-core 50051; do date;
            echo "Waiting for agent-core-grpc services..."; sleep 1; done;
          image: busybox:latest
          name: agent-core-grpc-probe
        - command:
          - sh
          - -c
          - trap "exit 1" TERM; until nc -vzw 5 openebs-etcd 2379;
            do date; echo "Waiting for etcd..."; sleep 1; done;
          image: busybox:latest
          name: etcd-probe
      containers:
      - name: metrics-exporter-io-engine
        image: "docker.io/openebs/mayastor-metrics-exporter-io-engine:v2.7.0"
        imagePullPolicy: IfNotPresent
        env:
        - name: MY_NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: MY_POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        ports:
          - containerPort: 9502
            protocol: TCP
            name: metrics
        args:
          - "--fmt-style=pretty"
          - "--ansi-colors=true"
      - name: io-engine
        image: "docker.io/openebs/mayastor-io-engine:v2.7.0"
        imagePullPolicy: IfNotPresent
        env:
        - name: RUST_LOG
          value: info
        - name: NVMF_TCP_MAX_QPAIRS_PER_CTRL
          value: "32"
        - name: NVMF_TCP_MAX_QUEUE_DEPTH
          value: "32"
        - name: NVME_TIMEOUT
          value: "110s"
        - name: NVME_TIMEOUT_ADMIN
          value: "30s"
        - name: NVME_KATO
          value: "10s"
        - name: MY_NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: MY_POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: NEXUS_NVMF_ANA_ENABLE
          value: "1"
        - name: NEXUS_NVMF_RESV_ENABLE
          value: "1"
        args:
        # The -l argument accepts cpu-list. Indexing starts at zero.
        # For example -l 1,2,10-20 means use core 1, 2, 10 to 20.
        # Note: Ensure that the CPU resources are updated accordingly.
        #       If you use 2 CPUs, the CPU: field should also read 2.
        - "-g$(MY_POD_IP)"
        - "-N$(MY_NODE_NAME)"
        - "-Rhttps://openebs-agent-core:50051"
        - "-y/var/local/openebs/io-engine/config.yaml"
        - "-l1,2"
        - "-p=openebs-etcd:2379"
        - "--ptpl-dir=/var/local/openebs/io-engine/ptpl/"
        - "--api-versions=v1"
        - "--tgt-crdt=30"
        - "--events-url=nats://openebs-nats:4222"
        command:
        - io-engine
        securityContext:
          privileged: true
        volumeMounts:
        - name: device
          mountPath: /dev
        - name: udev
          mountPath: /run/udev
        - name: dshm
          mountPath: /dev/shm
        - name: configlocation
          mountPath: /var/local/openebs/io-engine/
        - name: hugepage
          mountPath: /dev/hugepages
        resources:
          limits:
            cpu: "2"
            memory: "1Gi"
            hugepages-2Mi: "2Gi"
          requests:
            cpu: "2"
            memory: "1Gi"
            hugepages-2Mi: "2Gi"
        ports:
        - containerPort: 10124
          protocol: TCP
          name: io-engine
      volumes:
      - name: device
        hostPath:
          path: /dev
          type: Directory
      - name: udev
        hostPath:
          path: /run/udev
          type: Directory
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: "1Gi"
      - name: hugepage
        emptyDir:
          medium: HugePages
      - name: configlocation
        hostPath:
          path: /var/local/openebs/io-engine/
          type: DirectoryOrCreate
