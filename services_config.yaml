    env_vars:
      SERVICE_NAME: api-processing
      SERVICE_PORT: 8050
      VAULT_ADDR: https://vault:8200
      VAULT_SERVICE_NAME: vault
      VAULT_USERNAME: api-processing
      VAULT_PASSWORD: api-processing
  api-text-processing:
    expose_ports:
